# 서비스 공통 환경변수
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: rca-testbed-social
data:
  DB_HOST: testbed-mysql
  DB_PORT: "3306"
  DB_NAME: socialfeed

  POST_SERVICE_URL: http://testbed-post:8080
  FEED_SERVICE_URL: http://testbed-feed:8081
  COMMENT_SERVICE_URL: http://testbed-comment:8082
  NOTIFICATION_SERVICE_URL: http://testbed-notification:8083

  PUSH_GATEWAY_URL: http://testbed-mock-push-gateway:1080
---
# Nginx reverse proxy 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: rca-testbed-social
data:
  default.conf: |
    upstream post-service {
        server testbed-post:8080;
    }
    upstream feed-service {
        server testbed-feed:8081;
    }
    upstream comment-service {
        server testbed-comment:8082;
    }
    upstream notification-service {
        server testbed-notification:8083;
    }

    server {
        listen 80;

        location /api/posts {
            proxy_pass http://post-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users {
            proxy_pass http://post-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/feed {
            proxy_pass http://feed-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notifications {
            proxy_pass http://notification-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 'ok';
        }
    }
---
# MySQL init script (init.sql 내용을 ConfigMap 으로 마운트)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: rca-testbed-social
data:
  01-init.sql: |
    CREATE DATABASE IF NOT EXISTS socialfeed
        DEFAULT CHARACTER SET utf8mb4
        DEFAULT COLLATE utf8mb4_unicode_ci;
    USE socialfeed;

    CREATE TABLE IF NOT EXISTS posts (
        id          BIGINT AUTO_INCREMENT PRIMARY KEY,
        author_id   BIGINT NOT NULL,
        content     TEXT,
        created_at  DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at  DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        INDEX idx_post_author (author_id)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS feed_entries (
        id          BIGINT AUTO_INCREMENT PRIMARY KEY,
        user_id     BIGINT NOT NULL,
        post_id     BIGINT NOT NULL,
        created_at  DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at  DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        INDEX idx_feed_user (user_id),
        INDEX idx_feed_post (post_id),
        CONSTRAINT fk_feed_post FOREIGN KEY (post_id) REFERENCES posts(id)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS comments (
        id          BIGINT AUTO_INCREMENT PRIMARY KEY,
        post_id     BIGINT NOT NULL,
        author_id   BIGINT NOT NULL,
        content     TEXT,
        created_at  DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at  DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        INDEX idx_comment_post (post_id),
        CONSTRAINT fk_comment_post FOREIGN KEY (post_id) REFERENCES posts(id)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS notifications (
        id          BIGINT AUTO_INCREMENT PRIMARY KEY,
        user_id     BIGINT NOT NULL,
        type        VARCHAR(32),
        ref_id      BIGINT,
        read_flag   TINYINT DEFAULT 0,
        created_at  DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at  DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        INDEX idx_notif_user (user_id)
    ) ENGINE=InnoDB;

