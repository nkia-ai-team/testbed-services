apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: testbed-mysql
  namespace: rca-testbed-social
  labels:
    app: testbed-mysql
spec:
  serviceName: testbed-mysql
  replicas: 1
  selector:
    matchLabels:
      app: testbed-mysql
  template:
    metadata:
      labels:
        app: testbed-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: mysqldata
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: mysql-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: mysqldata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-mysql
  namespace: rca-testbed-social
spec:
  selector:
    app: testbed-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-mysql-external
  namespace: rca-testbed-social
spec:
  type: NodePort
  selector:
    app: testbed-mysql
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 30306
