apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-nginx
  namespace: rca-testbed-social
  labels:
    app: testbed-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-nginx
  template:
    metadata:
      labels:
        app: testbed-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-nginx-external
  namespace: rca-testbed-social
spec:
  type: NodePort
  selector:
    app: testbed-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
