# ============================================================
# 리소스 1: DB 초기화 SQL을 담는 ConfigMap — build-and-deploy.sh가 생성한다
# ============================================================
# PostgreSQL이 처음 시작될 때 /docker-entrypoint-initdb.d/ 폴더 안의
# SQL 파일을 알파벳순으로 자동 실행한다.
#
# (4번 증분 정정) 예전에는 이 ConfigMap의 data를 여기 YAML에 그대로 베껴 넣었는데,
# commerce/db/init-schemas.sql · commerce/db/seed-all.sql(docker-compose가 참조하는 정본)과
# 별도로 관리되다 보니 실제로 어긋났다 — 3a에서 스키마 4개(user/cart/pricing/shipping)를
# db/init-schemas.sql에 추가했지만 여기 복사본은 갱신되지 않아 stale 상태였다.
# 정본을 둘로 유지하는 대신, build-and-deploy.sh의 Phase 2.5가
# `kubectl create configmap postgres-init-scripts --from-file=...` 로 이 ConfigMap을
# db/init-schemas.sql · db/seed-all.sql 파일에서 직접 생성한다. 여기서는 리소스만 참조한다.
---
# ============================================================
# 리소스 2: PostgreSQL StatefulSet
# ============================================================
# Deployment와 구조가 거의 같다. 차이점:
#   1. kind가 StatefulSet
#   2. serviceName 필드가 추가됨 (고정 네트워크 이름용)
#   3. volumeClaimTemplates로 PVC(디스크)를 자동 생성
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: testbed-postgres
  namespace: rca-testbed-commerce
  labels:
    app: testbed-postgres
spec:
  # StatefulSet 전용: 이 이름으로 고정된 네트워크 주소가 만들어진다.
  # Pod 이름이 항상 testbed-postgres-0 으로 고정되는 이유.
  serviceName: testbed-postgres
  replicas: 1
  selector:
    matchLabels:
      app: testbed-postgres
  template:
    metadata:
      labels:
        app: testbed-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          # Polestar DPM(slowSQL 수집)용 pg_stat_statements는 서버 시작 시점에
          # shared_preload_libraries로 로드되어야 한다 (postgresql.conf 기본값엔 없음).
          args: ["-c", "shared_preload_libraries=pg_stat_statements"]
          ports:
            - containerPort: 5432
          # Secret에서 POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD를 환경변수로 주입.
          # PostgreSQL 공식 이미지는 이 환경변수를 읽어서 DB와 사용자를 자동 생성한다.
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            # (1) DB 데이터 파일 저장 경로 → PVC(영구 디스크)에 연결
            #     Pod가 죽어도 이 디스크의 데이터는 살아있다.
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            # (2) 초기화 SQL 파일 → ConfigMap에서 가져와서 이 폴더에 넣음
            #     PostgreSQL이 처음 시작할 때 여기 있는 SQL을 자동 실행.
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        # init-scripts 볼륨의 실체: 위에서 만든 ConfigMap
        # ConfigMap의 키(파일이름)가 폴더 안에 파일로 생성된다.
        #   01-init-schemas.sql → /docker-entrypoint-initdb.d/01-init-schemas.sql
        #   02-seed-all.sql     → /docker-entrypoint-initdb.d/02-seed-all.sql
        - name: init-scripts
          configMap:
            name: postgres-init-scripts

  # StatefulSet 전용: PVC(디스크) 자동 생성 템플릿
  # Deployment에는 이 필드가 없다 (stateless라 디스크 불필요).
  # Pod가 죽고 새로 떠도 이 PVC는 삭제되지 않아서 데이터가 보존된다.
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]  # 한 번에 하나의 Pod만 이 디스크에 쓸 수 있음
        resources:
          requests:
            storage: 5Gi                # 5GB 디스크 공간 요청
---
# ============================================================
# 리소스 3: PostgreSQL Service (ClusterIP) — 클러스터 내부 통신용
# ============================================================
# 마이크로서비스들이 DB에 접속할 때 사용하는 이름.
# ConfigMap의 DB_HOST=testbed-postgres 가 바로 이 Service를 가리킨다.
apiVersion: v1
kind: Service
metadata:
  name: testbed-postgres
  namespace: rca-testbed-commerce
spec:
  selector:
    app: testbed-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ============================================================
# 리소스 4: PostgreSQL Service (NodePort) — 외부 접근용
# ============================================================
# Polestar10 DPM(DB 모니터링)이 K3s 밖에서 DB에 접속할 때 사용.
# 192.168.200.109:30432 로 접근하면 PostgreSQL Pod로 연결된다.
apiVersion: v1
kind: Service
metadata:
  name: testbed-postgres-external
  namespace: rca-testbed-commerce
spec:
  type: NodePort                     # 외부 접근 허용
  selector:
    app: testbed-postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432                # 외부에서 접근하는 포트 (30000~32767 범위)
