apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-cart
  namespace: rca-testbed-commerce
  labels:
    app: testbed-cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-cart
  template:
    metadata:
      labels:
        app: testbed-cart
    spec:
      containers:
        - name: cart-service
          image: commerce-cart:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: service-config
            - secretRef:
                name: postgres-secret
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-cart
  namespace: rca-testbed-commerce
spec:
  selector:
    app: testbed-cart
  ports:
    - port: 8086
      targetPort: 8086
