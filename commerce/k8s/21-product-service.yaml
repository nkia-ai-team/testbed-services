apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-product            # 이 Deployment의 이름
  namespace: rca-testbed-commerce           # 어떤 네임스페이스에 만들지
  labels:
    app: testbed-product           # Deployment 자체에 붙이는 라벨
spec:
  replicas: 1                      # Pod 1개 유지
  selector:
    matchLabels:
      app: testbed-product         # "이 라벨이 붙은 Pod를 내가 관리할게"
  template:                        # Pod 템플릿 = "이 틀대로 Pod를 찍어내줘"
    metadata:
      labels:
        app: testbed-product       # 찍어낸 Pod에 붙일 라벨 (selector와 일치해야!)
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: Directory
      containers:                  # 이 Pod 안에 들어갈 컨테이너 목록
        - name: product-service    # 컨테이너 이름 (자유롭게 지정)
          image: commerce-product:latest # 어떤 Docker 이미지를 쓸지
          imagePullPolicy: Never         # 로컬 이미지 사용 (인터넷에서 안 받음)
          ports:
            - containerPort: 8081        # 이 컨테이너가 듣는 포트
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true

          # --- 환경변수 주입 ---
          # envFrom: ConfigMap/Secret의 모든 키-값을 한꺼번에 환경변수로 넣음
          # 예: ConfigMap에 DB_HOST=testbed-postgres가 있으면
          #     컨테이너 안에서 환경변수 DB_HOST로 접근 가능
          envFrom:
            - configMapRef:
                name: service-config     # ConfigMap
            - secretRef:
                name: postgres-secret    # Secret

          # env: 개별 환경변수를 하나씩 지정 (이름을 바꿔서 넣을 때 유용)
          # Secret에는 POSTGRES_USER로 저장했지만, 우리 앱은 DB_USER를 기대함
          env:
            - name: DB_USER              # 컨테이너 안에서 쓸 이름
              valueFrom:
                secretKeyRef:
                  name: postgres-secret   # 어떤 Secret에서
                  key: POSTGRES_USER      # 어떤 키의 값을 가져올지
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # --- APM Java Agent ---
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
            # OTLP 는 노드 로컬 OTel 에이전트(lucida-otel-supervisor, OpAMP 관리)로 보낸다.
            # AP collector 직접 전송은 에이전트 설치 전 임시 우회였음 (2026-07-13 전환).
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: "commerce-product"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.organizationId=${POLESTAR_ORG_ID},lucida.groupId=commerce,lucida.target_id=${PRODUCT_TARGET_ID}"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"

          # --- 헬스체크 (Probe) ---
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5

          # --- 리소스 제한 ---
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-product
  namespace: rca-testbed-commerce
spec:
  selector:
    app: testbed-product
  ports:
    - port: 8081
      targetPort: 8081