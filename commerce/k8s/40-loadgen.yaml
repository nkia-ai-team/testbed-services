# ============================================================
# 지속 부하 생성기(loadgen) — §8. 상시 Deployment.
# ============================================================
# 시나리오(장애 주입)와 별개인 baseline 트래픽 생성기. Java 모듈이 아니라 공식 grafana/k6
# 이미지를 그대로 쓴다(로컬 빌드/이미지 임포트 대상 아님 — build-and-deploy.sh의 SERVICES
# 배열에도 포함시키지 않았다).
#
# 스크립트(script.js/entrypoint.sh)는 이 YAML에 내용을 베껴 넣지 않고 loadgen-scripts
# ConfigMap으로 마운트한다. 그 ConfigMap 자체는 build-and-deploy.sh의 Phase 2.5가
# commerce/loadgen/*.js·*.sh 파일에서 `kubectl create configmap --from-file`로 직접
# 생성한다 — 10-postgres.yaml의 postgres-init-scripts와 동일한 이유(파일-ConfigMap
# 드리프트 방지, 4번 증분에서 실제로 그 드리프트 버그를 겪고 고친 패턴을 그대로 재사용).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-loadgen
  namespace: rca-testbed-commerce
  labels:
    app: testbed-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-loadgen
  template:
    metadata:
      labels:
        app: testbed-loadgen
    spec:
      containers:
        - name: loadgen
          image: grafana/k6:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/entrypoint.sh"]
          envFrom:
            - configMapRef:
                name: service-config
          env:
            - name: GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: GATEWAY_SERVICE_URL
            - name: BANKING_TRANSFER_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: BANKING_TRANSFER_URL
            - name: SCRIPT_PATH
              value: "/scripts/script.js"
            # RPS 진폭/시드는 env로 조정 가능(§8) — 4노드 ARM VM 규모라 보수적 기본값.
            - name: PEAK_RPS
              value: "10"
            - name: TROUGH_RPS
              value: "2"
            - name: LOADGEN_SEED
              value: "42"
            - name: PRE_ALLOCATED_VUS
              value: "20"
            - name: MAX_VUS
              value: "50"
          volumeMounts:
            - name: loadgen-scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: loadgen-scripts
          configMap:
            name: loadgen-scripts
            defaultMode: 0755
