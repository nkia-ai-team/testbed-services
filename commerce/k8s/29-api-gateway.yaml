apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-gateway
  namespace: rca-testbed-commerce
  labels:
    app: testbed-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-gateway
  template:
    metadata:
      labels:
        app: testbed-gateway
    spec:
      containers:
        - name: api-gateway
          image: commerce-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8089
          # DB가 없는 순수 라우팅/집계 계층이라 postgres-secret은 주입하지 않는다.
          envFrom:
            - configMapRef:
                name: service-config
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-gateway
  namespace: rca-testbed-commerce
spec:
  selector:
    app: testbed-gateway
  ports:
    - port: 8089
      targetPort: 8089
