# ============================================================
# Kafka Deployment (KRaft 모드, 단일 브로커)
# ============================================================
# 도메인 이벤트 백본. order/payment/inventory가 outbox 릴레이로 발행하고
# notification-service 등이 구독한다.
# ZooKeeper 없는 KRaft 모드 단일 브로커 — 테스트베드 규모에 맞춘 최소 구성.
# 데이터가 날아가도 상관없는 테스트베드지만, 컨슈머 오프셋/토픽이 Pod 재시작마다
# 초기화되면 outbox 릴레이 재전송·리밸런싱 관측이 왜곡되므로 StatefulSet + PVC로 유지.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: testbed-kafka
  namespace: rca-testbed-commerce
  labels:
    app: testbed-kafka
spec:
  serviceName: testbed-kafka
  replicas: 1
  selector:
    matchLabels:
      app: testbed-kafka
  template:
    metadata:
      labels:
        app: testbed-kafka
    spec:
      containers:
        - name: kafka
          # ARM64(aarch64) 배포 대상 — apache/kafka는 멀티아치(arm64 포함) 공식 이미지.
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092   # 클라이언트(마이크로서비스) 접속 포트
            - containerPort: 9093   # controller(KRaft) 내부 포트
          env:
            # --- KRaft 모드: 단일 노드가 broker + controller 역할 겸임 ---
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            # --- 리스너: 클러스터 내부 DNS로 접속하는 서비스들이 쓸 주소 ---
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            # CONTROLLER 리스너도 advertised.listeners 에 명시해야 한다 — core-banking 실기동 검증에서 발견:
            # apache/kafka:3.9.0 KRaft combined mode 는 CONTROLLER 항목 누락 시 listeners 의 0.0.0.0 이
            # 흘러들어가 "advertised.listeners cannot use the nonroutable meta-address 0.0.0.0" 로 기동 실패한다.
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://testbed-kafka:9092,CONTROLLER://testbed-kafka:9093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # --- 파티션/토픽 기본값 ---
            # num.partitions=3: 이후 파티션 스큐 장애 시나리오(특정 파티션에 트래픽 쏠림) 재현용.
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: CLUSTER_ID
              value: "rca-testbed-commerce-kafka-1"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 800m
              memory: 1536Mi
          startupProbe:
            tcpSocket:
              port: 9092
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# ============================================================
# Service (ClusterIP) — 마이크로서비스가 testbed-kafka:9092 로 접속
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: testbed-kafka
  namespace: rca-testbed-commerce
spec:
  selector:
    app: testbed-kafka
  ports:
    - port: 9092
      targetPort: 9092
