# (1) 서비스 환경변수
# 5개 마이크로서비스가 공통으로 사용하는 설정값들.
# 나중에 Deployment에서 envFrom으로 한꺼번에 주입한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: rca-testbed-commerce
data:
  # --- DB 접속 정보 ---
  # "testbed-postgres"는 나중에 만들 PostgreSQL Service의 이름이다.
  # K8s 내부 DNS가 이 이름을 실제 Pod IP로 변환해준다.
  DB_HOST: testbed-postgres
  DB_PORT: "5432"

  # --- Redis 접속 정보 ---
  REDIS_HOST: testbed-redis
  REDIS_PORT: "6379"

  # --- Kafka 접속 정보 ---
  KAFKA_BOOTSTRAP_SERVERS: testbed-kafka:9092

  # --- 서비스 간 통신 URL ---
  # order-service가 다른 서비스를 호출할 때 쓰는 주소.
  # "testbed-product"는 product-service의 K8s Service 이름이다.
  PRODUCT_SERVICE_URL: http://testbed-product:8081
  PAYMENT_SERVICE_URL: http://testbed-payment:8083
  INVENTORY_SERVICE_URL: http://testbed-inventory:8082
  USER_SERVICE_URL: http://testbed-user:8085
  CART_SERVICE_URL: http://testbed-cart:8086
  PRICING_SERVICE_URL: http://testbed-pricing:8087
  SHIPPING_SERVICE_URL: http://testbed-shipping:8088
  # api-gateway가 /api/orders/** 프록시 + BFF 집계(최근 주문 조회)에 order-service를 호출한다.
  ORDER_SERVICE_URL: http://testbed-order:8080
  # loadgen(§8 지속 부하 생성기)이 client 진입점(§2 그래프)으로 호출하는 게이트웨이 주소.
  GATEWAY_SERVICE_URL: http://testbed-gateway:8089

  # --- 외부 PG Mock 서버 ---
  # pg-mock은 K3s 밖에서 Docker로 돌아가므로, 서버 IP를 직접 적는다.
  PG_API_URL: http://192.168.200.109:8190

  # --- cross-domain: core-banking 이체 API ---
  # payment-service가 결제 처리 시 core-banking(별도 namespace)의 transfer-service를 호출한다.
  # namespace가 분리되어 있어 FQDN으로 접근한다.
  BANKING_TRANSFER_URL: http://testbed-transfer.rca-testbed-banking.svc.cluster.local:8082
---
# (2) Nginx reverse proxy 설정
# 외부에서 :30080으로 들어오는 요청을 order-service로 전달하는 설정.
# 이 ConfigMap은 Nginx 컨테이너 안에 "파일"로 마운트된다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: rca-testbed-commerce
data:
  # "default.conf"가 파일 이름이 되고, 아래 내용이 파일 내용이 된다.
  # Nginx 컨테이너의 /etc/nginx/conf.d/default.conf 에 들어감.
  # 경로별로 해당 서비스로 라우팅하는 Nginx 설정.
  # /api/products → product-service, /api/orders → order-service 등.
  # §2 목표 그래프(client → api-gateway → 각 도메인 서비스)에 맞춰 nginx는 모든 /api/*를
  # api-gateway 단일 upstream으로만 전달한다. 개별 서비스 라우팅/인증/집계는 게이트웨이가 맡는다.
  default.conf: |
    upstream api-gateway {
        server testbed-gateway:8089;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://api-gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 'ok';
        }
    }
