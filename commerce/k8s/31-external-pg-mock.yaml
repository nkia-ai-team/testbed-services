# external-pg-mock — payment-service 의 외부 PG 의존 시뮬레이터 (food-delivery 30-external-pg-mock 과 동일 패턴).
# 원래 commerce 는 109 호스트의 FastAPI mock(plopvape-pg-mock, :8190)을 바라봤으나,
# 109 실배포에서 해당 프로세스 부재로 checkout 전체가 CB open 으로 전멸하는 문제가 확인되어
# (2026-07-13) 설계 §6 대로 클러스터 내부 mockserver 로 이관했다.
# failure_surface: external-timeout — 시나리오가 PUT /mockserver/expectation 으로 지연/504/hang 주입.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-external-pg-mock
  namespace: rca-testbed-commerce
  labels:
    app: testbed-external-pg-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-external-pg-mock
  template:
    metadata:
      labels:
        app: testbed-external-pg-mock
    spec:
      containers:
        - name: mockserver
          image: mockserver/mockserver:latest
          ports:
            - containerPort: 1080
          env:
            - name: MOCKSERVER_LIVENESS_HTTP_GET_PATH
              value: /liveness/probe
            - name: MOCKSERVER_INITIALIZATION_JSON_PATH
              value: /config/init.json
          volumeMounts:
            - name: mock-init
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: mock-init
          configMap:
            name: external-pg-mock-init
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-external-pg-mock
  namespace: rca-testbed-commerce
spec:
  selector:
    app: testbed-external-pg-mock
  ports:
    - port: 9090
      targetPort: 1080
---
# 기본 expectation: POST /v1/payments → 200 {status: APPROVED, transaction_id}.
# PgApiClient 가 읽는 필드(status, transaction_id) 계약에 맞춘다.
# 시나리오는 mockserver REST API 로 이 expectation 을 덮어써 지연/504 를 주입한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-pg-mock-init
  namespace: rca-testbed-commerce
data:
  init.json: |
    [
      {
        "httpRequest": {
          "method": "POST",
          "path": "/v1/payments"
        },
        "httpResponse": {
          "statusCode": 200,
          "headers": {
            "content-type": ["application/json"]
          },
          "body": "{\"status\":\"APPROVED\",\"transaction_id\":\"mock-tx-commerce-0001\"}"
        }
      }
    ]
