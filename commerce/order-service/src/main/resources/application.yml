server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/commerce
    username: ${DB_USER:commerce}
    password: ${DB_PASS:commerce1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: order_schema
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  health:
    kafka:
      enabled: false

outbox:
  relay:
    enabled: true

topics:
  orders: commerce.orders
  payments: commerce.payments

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
    connect-timeout: 3s
    read-timeout: 10s
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
    connect-timeout: 3s
    read-timeout: 15s
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
    connect-timeout: 3s
    read-timeout: 10s
  cart:
    url: ${CART_SERVICE_URL:http://localhost:8086}
    connect-timeout: 3s
    read-timeout: 10s
  pricing:
    url: ${PRICING_SERVICE_URL:http://localhost:8087}
    connect-timeout: 3s
    read-timeout: 10s

# checkout 5-hop(cart→pricing→inventory(product경유)→payment)의 모든 하류 호출에
# timeout(위 services.*.read-timeout) + retry(지수백오프) + circuit breaker를 서비스별로 분리 적용.
resilience4j:
  circuitbreaker:
    instances:
      productClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      inventoryClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      paymentClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      cartClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      pricingClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
  retry:
    instances:
      productClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      inventoryClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      paymentClient:
        # 결제는 재시도 증폭(중복 결제) 위험이 커서 시도 횟수를 낮게 유지.
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      cartClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
      pricingClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.commerce.common.exception.ClientErrorException
