server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/commerce
    username: ${DB_USER:commerce}
    password: ${DB_PASS:commerce1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: order_schema
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  health:
    kafka:
      enabled: false

outbox:
  relay:
    enabled: true

topics:
  orders: commerce.orders
  payments: commerce.payments

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
    connect-timeout: 3s
    read-timeout: 10s
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
    connect-timeout: 3s
    read-timeout: 15s
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
    connect-timeout: 3s
    read-timeout: 10s
