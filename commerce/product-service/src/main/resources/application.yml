server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/plopvape
    username: ${DB_USER:plopvape}
    password: ${DB_PASS:plopvape1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: product_schema
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

services:
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
    connect-timeout: 3s
    read-timeout: 10s
