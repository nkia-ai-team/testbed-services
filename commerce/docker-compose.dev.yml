services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plopvape
      POSTGRES_USER: plopvape
      POSTGRES_PASSWORD: plopvape1234
    ports:
      - "15432:5432"
    volumes:
      - ./db/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "16381:6379"

volumes:
  pgdata:
