server:
  port: 8089

spring:
  application:
    name: api-gateway
  # commerce-common이 spring-boot-starter-data-jpa를 컴파일 의존성으로 갖고 있어(outbox 패턴용)
  # 전이 의존성으로 딸려온다. 게이트웨이는 DB가 없으므로 JPA/DataSource 자동설정을 꺼서
  # DataSource 빈 부재로 인한 기동 실패를 막는다.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

services:
  user:
    url: ${USER_SERVICE_URL:http://localhost:8085}
    connect-timeout: 3s
    read-timeout: 10s
  cart:
    url: ${CART_SERVICE_URL:http://localhost:8086}
    connect-timeout: 3s
    read-timeout: 10s
  pricing:
    url: ${PRICING_SERVICE_URL:http://localhost:8087}
    connect-timeout: 3s
    read-timeout: 10s
  shipping:
    url: ${SHIPPING_SERVICE_URL:http://localhost:8088}
    connect-timeout: 3s
    read-timeout: 10s
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8080}
    connect-timeout: 3s
    read-timeout: 15s
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
    connect-timeout: 3s
    read-timeout: 10s

# 하류 서비스별 CB/Retry 인스턴스 분리 — 한 서비스 장애가 다른 라우트로 번지지 않게 격리.
resilience4j:
  circuitbreaker:
    instances:
      user:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      cart:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      pricing:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      shipping:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      order:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      product:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      user:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      cart:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      pricing:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      shipping:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      order:
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      product:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
