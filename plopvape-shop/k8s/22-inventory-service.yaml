apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-inventory
  namespace: rca-testbed-plopvape
  labels:
    app: testbed-inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-inventory
  template:
    metadata:
      labels:
        app: testbed-inventory
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: Directory
        - name: wpm-agent
          hostPath:
            path: /opt/polestar10/wpm
            type: Directory
      containers:
        - name: inventory-service
          image: plopvape-inventory:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true
            - name: wpm-agent
              mountPath: /opt/wpm
              readOnly: true
          envFrom:
            - configMapRef:
                name: service-config
            - secretRef:
                name: postgres-secret
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # --- APM Java Agent ---
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/apm/opentelemetry-javaagent.jar -javaagent:/opt/wpm/wpmagent.jar -Dwpm.config=/opt/wpm/wpmagent-inventory.conf"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "${OTLP_ENDPOINT}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: "plopvape-inventory"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.organizationId=69731678b56620b247fb279a,lucida.groupId=plopvape-shop"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-inventory
  namespace: rca-testbed-plopvape
spec:
  selector:
    app: testbed-inventory
  ports:
    - port: 8082
      targetPort: 8082
