# ============================================================
# Nginx Reverse Proxy — 외부 요청의 유일한 입구
# ============================================================
# 외부에서 192.168.200.109:30080 으로 요청하면:
#   NodePort(30080) → Nginx(:80) → order-service(:8080)
#
# Nginx 설정은 02-configmaps.yaml의 nginx-conf ConfigMap에 있다.
# 그 ConfigMap을 /etc/nginx/conf.d/ 폴더에 파일로 마운트한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-nginx
  namespace: rca-testbed
  labels:
    app: testbed-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-nginx
  template:
    metadata:
      labels:
        app: testbed-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          # ConfigMap "nginx-conf"를 /etc/nginx/conf.d/ 폴더에 마운트.
          # ConfigMap에 있는 "default.conf" 키가 이 폴더 안에 파일로 생성된다.
          # → /etc/nginx/conf.d/default.conf
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf          # 02-configmaps.yaml에서 만든 ConfigMap
---
# ============================================================
# Nginx Service (NodePort) — 외부 접근 포트
# ============================================================
# 이게 전체 시스템의 정문이다.
# 외부에서 192.168.200.109:30080 으로 요청하면 이 Service가 받아서
# Nginx Pod의 80번 포트로 전달한다.
# Polestar10 WPM(웹 성능 모니터링)도 이 포트를 감시한다.
apiVersion: v1
kind: Service
metadata:
  name: testbed-nginx-external
  namespace: rca-testbed
spec:
  type: NodePort
  selector:
    app: testbed-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080                  # 외부 접근 포트
