# (1) 서비스 환경변수
# 5개 마이크로서비스가 공통으로 사용하는 설정값들.
# 나중에 Deployment에서 envFrom으로 한꺼번에 주입한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: rca-testbed
data:
  # --- DB 접속 정보 ---
  # "testbed-postgres"는 나중에 만들 PostgreSQL Service의 이름이다.
  # K8s 내부 DNS가 이 이름을 실제 Pod IP로 변환해준다.
  DB_HOST: testbed-postgres
  DB_PORT: "5432"

  # --- Redis 접속 정보 ---
  REDIS_HOST: testbed-redis
  REDIS_PORT: "6379"

  # --- 서비스 간 통신 URL ---
  # order-service가 다른 서비스를 호출할 때 쓰는 주소.
  # "testbed-product"는 product-service의 K8s Service 이름이다.
  PRODUCT_SERVICE_URL: http://testbed-product:8081
  PAYMENT_SERVICE_URL: http://testbed-payment:8083
  INVENTORY_SERVICE_URL: http://testbed-inventory:8082

  # --- 외부 PG Mock 서버 ---
  # pg-mock은 K3s 밖에서 Docker로 돌아가므로, 서버 IP를 직접 적는다.
  PG_API_URL: http://192.168.200.109:8090
---
# (2) Nginx reverse proxy 설정
# 외부에서 :30080으로 들어오는 요청을 order-service로 전달하는 설정.
# 이 ConfigMap은 Nginx 컨테이너 안에 "파일"로 마운트된다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: rca-testbed
data:
  # "default.conf"가 파일 이름이 되고, 아래 내용이 파일 내용이 된다.
  # Nginx 컨테이너의 /etc/nginx/conf.d/default.conf 에 들어감.
  # 경로별로 해당 서비스로 라우팅하는 Nginx 설정.
  # /api/products → product-service, /api/orders → order-service 등.
  default.conf: |
    upstream order-service {
        server testbed-order:8080;
    }
    upstream product-service {
        server testbed-product:8081;
    }
    upstream inventory-service {
        server testbed-inventory:8082;
    }
    upstream payment-service {
        server testbed-payment:8083;
    }

    server {
        listen 80;

        location /api/products {
            proxy_pass http://product-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/inventory {
            proxy_pass http://inventory-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/payments {
            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders {
            proxy_pass http://order-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 'ok';
        }
    }
