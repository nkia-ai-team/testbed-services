# ============================================================
# Redis Deployment
# ============================================================
# Redis는 우리 프로젝트에서 이벤트 스트림(주문 이벤트 → notification-service) 용도.
# 테스트베드라서 데이터가 날아가도 상관없으므로 StatefulSet이 아닌 Deployment으로 배포.
# → PVC(영구 디스크) 없음. Pod 죽으면 Redis 데이터도 사라지지만 OK.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-redis
  namespace: rca-testbed
  labels:
    app: testbed-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-redis
  template:
    metadata:
      labels:
        app: testbed-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          # Redis는 환경변수 설정이 필요 없다 (기본 설정으로 충분).
          # ConfigMap/Secret 주입 없음.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
# Service (ClusterIP) — notification-service 등이 redis에 접속할 때 사용
# ConfigMap의 REDIS_HOST=testbed-redis 가 이 Service를 가리킨다.
apiVersion: v1
kind: Service
metadata:
  name: testbed-redis
  namespace: rca-testbed
spec:
  selector:
    app: testbed-redis
  ports:
    - port: 6379
      targetPort: 6379
