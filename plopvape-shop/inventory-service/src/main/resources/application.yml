server:
  port: 8082

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/plopvape
    username: ${DB_USER:plopvape}
    password: ${DB_PASS:plopvape1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: inventory_schema
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
