{
  "schema_version": "1.0",
  "id": "F20-R",
  "slug": "f20-r-commerce-order-slowquery-shared-pg-crossschema",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "tb-runner",
    "matrix_location_transport": "R/ssh load.north_south → commerce slowquery.js(stats/daily+무제한 search 80%, checkout 대표 20%)",
    "transport": "ssh",
    "profile_refs": [
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-ssh-access",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "load.north_south",
        "companion_refs": [],
        "approved_profile_id": "load.north_south"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "15m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f20-r",
              "parameters": {
                "target_rps": 30,
                "ramp_up": "2m",
                "hold": "8m",
                "ramp_down": "1m",
                "entry_url": "http://192.168.122.77:30080",
                "script_path": "/opt/loadgen/commerce/slowquery.js",
                "scenario_tag": "scenario_id=F20-R",
                "seed": 4242,
                "baseline_unit": "loadgen-commerce"
              },
              "min_hold": "8m",
              "settle": "30s",
              "timeout": "13m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-order"
            },
            "freshness": "30s"
          },
          {
            "id": "order_p95",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_p95",
            "parameters": {
              "service_name": "commerce-order"
            },
            "freshness": "120s"
          },
          {
            "id": "payment_p95",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_p95",
            "parameters": {
              "service_name": "commerce-payment"
            },
            "freshness": "120s"
          },
          {
            "id": "payment_error_rate",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_error_rate",
            "parameters": {
              "service_name": "commerce-payment"
            },
            "freshness": "60s"
          },
          {
            "id": "pg_slow_active_query_count",
            "adapter": "database",
            "query_id": "database.pg_slow_active_query_count",
            "parameters": {
              "db_host": "192.168.122.77",
              "db_port": 30432,
              "db_name": "commerce",
              "db_user": "commerce"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "order_slowquery_read_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.read_step_status_rate",
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "order-latency-up",
              "observation": "order_p95",
              "op": "gte",
              "value": 1.5
            },
            {
              "id": "payment-crossschema-latency-up",
              "observation": "payment_p95",
              "op": "gte",
              "value": 0.5
            },
            {
              "id": "payment-not-erroring",
              "observation": "payment_error_rate",
              "op": "lt",
              "value": 0.05
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "external-rate-limit",
              "observation": "entry_status",
              "op": "eq",
              "value": 429
            },
            {
              "id": "payment-service-down",
              "observation": "payment_error_rate",
              "op": "gte",
              "value": 0.2
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "order-pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "order-latency-recovered",
              "observation": "order_p95",
              "op": "lt",
              "value": 0.5
            },
            {
              "id": "payment-latency-recovered",
              "observation": "payment_p95",
              "op": "lt",
              "value": 0.3
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "verified OrderRepository.dailyStats/search 풀스캔 앵커(created_at 인덱스 부재); 신규 slowquery.js(stats/daily+무제한 search, checkout 대표여정 20%) + load.north_south 계약 등록; DB-side pg_slow_active_query_count 신설(러너 backend/app/live_probes.py)",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
