{
  "schema_version": "1.0",
  "id": "F05-G",
  "slug": "f05-g-invalid-image-no-impact",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "commerce namespace",
    "matrix_location_transport": "K/kubectl → `rca-testbed-commerce/testbed-payment`",
    "transport": "kubectl",
    "profile_refs": [
      "injector-profiles/k8s.lifecycle",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-kubernetes-rbac",
      "kubernetes-recovery-capacity",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "k8s.lifecycle",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "k8s.lifecycle"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "12m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "2h",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f05-g",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-payment",
                "container": "payment-service",
                "baseline_image": "commerce-payment:latest",
                "invalid_image": "commerce-payment:scenario-invalid-f05-g"
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "10m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "available_replicas",
            "adapter": "kubernetes",
            "query_id": "kubernetes.deployment_available_replicas",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "image_pull_failed",
            "adapter": "kubernetes",
            "query_id": "kubernetes.image_pull_failure",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment",
              "container": "payment-service"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "business_ok",
            "adapter": "business_probe",
            "query_id": "business.checkout_invariant",
            "freshness": "60s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "invalid-image-observed",
              "observation": "image_pull_failed",
              "op": "eq",
              "value": true
            },
            {
              "id": "old-replica-ready",
              "observation": "available_replicas",
              "op": "gte",
              "value": 1
            },
            {
              "id": "business-invariant-preserved",
              "observation": "business_ok",
              "op": "eq",
              "value": true
            },
            {
              "id": "controlled-load",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 15
            }
          ],
          "consecutive_ticks": 2
        },
        "must_rule_out": {
          "any": [
            {
              "id": "user-impact",
              "observation": "entry_status",
              "op": "gte",
              "value": 500
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "no-serving-replica",
              "observation": "available_replicas",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "2h",
          "post_window": "45m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "k8s.lifecycle",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "k8s.lifecycle",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "k8s.lifecycle"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-2h,t2+45m]",
    "export_not_before": "t2+45m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+45m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
