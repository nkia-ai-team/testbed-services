{
  "schema_version": "1.0",
  "id": "F20-P",
  "slug": "f20-p-banking-transfer-slowquery-trunc-pool-contention",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "tb-runner",
    "matrix_location_transport": "R/ssh load.north_south → core-banking slowquery.js(stats/daily 80%, 대표 이체 20%)",
    "transport": "ssh",
    "profile_refs": [
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-ssh-access",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "load.north_south",
        "companion_refs": [],
        "approved_profile_id": "load.north_south"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "15m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f20-p",
              "parameters": {
                "target_rps": 20,
                "ramp_up": "2m",
                "hold": "8m",
                "ramp_down": "1m",
                "entry_url": "http://192.168.122.77:30082",
                "script_path": "/opt/loadgen/core-banking/slowquery.js",
                "scenario_tag": "scenario_id=F20-P",
                "seed": 4242,
                "baseline_unit": "loadgen-banking"
              },
              "min_hold": "8m",
              "settle": "30s",
              "timeout": "13m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-banking",
              "resource": "testbed-transfer"
            },
            "freshness": "30s"
          },
          {
            "id": "transfer_p95",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_p95",
            "parameters": {
              "service_name": "core-banking-transfer"
            },
            "freshness": "120s"
          },
          {
            "id": "account_error_rate",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_error_rate",
            "parameters": {
              "service_name": "core-banking-account"
            },
            "freshness": "60s"
          },
          {
            "id": "api_error_rate",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_error_rate",
            "parameters": {
              "service_name": "core-banking-api"
            },
            "freshness": "60s"
          },
          {
            "id": "ledger_error_rate",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_error_rate",
            "parameters": {
              "service_name": "core-banking-ledger"
            },
            "freshness": "60s"
          },
          {
            "id": "transfer_hikari_pending",
            "adapter": "prometheus",
            "query_id": "prometheus.hikari_pending_connections",
            "parameters": {
              "service_name": "core-banking-transfer"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "transfer_slowquery_read_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.read_step_status_rate",
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "transfer-latency-up",
              "observation": "transfer_p95",
              "op": "gte",
              "value": 3.0
            },
            {
              "id": "account-502-up",
              "observation": "account_error_rate",
              "op": "gte",
              "value": 0.1
            },
            {
              "id": "transfer-pool-occupied",
              "observation": "transfer_hikari_pending",
              "op": "gt",
              "value": 0
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "external-rate-limit",
              "observation": "entry_status",
              "op": "eq",
              "value": 429
            },
            {
              "id": "oracle-global-outage",
              "observation": "ledger_error_rate",
              "op": "gte",
              "value": 0.3
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "transfer-pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "transfer-latency-recovered",
              "observation": "transfer_p95",
              "op": "lt",
              "value": 1.0
            },
            {
              "id": "account-recovered",
              "observation": "account_error_rate",
              "op": "lt",
              "value": 0.02
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "verified TransferRepository.dailyStatsSince native trunc(created_at) 풀스캔 앵커(idx_transfers_created 존재/무력화); 신규 slowquery.js(stats/daily 80%+대표 이체 20%) + load.north_south 계약 등록; 러너 APPROVED_HIKARI_SERVICES/APPROVED_APM_SERVICES에 core-banking-transfer/account/api/ledger 추가",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
