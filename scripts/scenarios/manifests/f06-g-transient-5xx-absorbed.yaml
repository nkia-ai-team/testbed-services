{
  "schema_version": "1.0",
  "id": "F06-G",
  "slug": "f06-g-transient-5xx-absorbed",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "commerce external-pg-mock",
    "matrix_location_transport": "K/kubectl → 대상 MockServer API",
    "transport": "api-via-kubectl",
    "profile_refs": [
      "injector-profiles/mock.expectation",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-api-contract",
      "mock-restore-contract",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "mock.expectation",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "mock.expectation"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "12m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "2h",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f06-g",
              "parameters": {
                "path": "/v1/payments",
                "mode": "transient_status",
                "status_code": 500,
                "remaining_times": 1,
                "ttl_seconds": 10,
                "pulse_interval_seconds": 15,
                "max_pulses": 32
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "10m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "checkout_5xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_5xx_rate",
            "freshness": "30s"
          },
          {
            "id": "business_ok",
            "adapter": "business_probe",
            "query_id": "business.checkout_invariant",
            "freshness": "60s"
          },
          {
            "id": "transient_consumed_count",
            "adapter": "business_probe",
            "query_id": "mock.transient_consumed_count",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          },
          {
            "id": "pulse_age_seconds",
            "adapter": "business_probe",
            "query_id": "mock.pulse_age_seconds",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          },
          {
            "id": "duplicate_expectation_count",
            "adapter": "business_probe",
            "query_id": "mock.duplicate_expectation_count",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          },
          {
            "id": "expired_unconsumed_count",
            "adapter": "business_probe",
            "query_id": "mock.expired_unconsumed_count",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          },
          {
            "id": "payment_duplicate_order_count_since_t1",
            "adapter": "database",
            "query_id": "database.payment_duplicate_order_count_since_t1",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          },
          {
            "id": "expectation_absent",
            "adapter": "business_probe",
            "query_id": "mock.transient_expectation_absent",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          },
          {
            "id": "snapshot_restored",
            "adapter": "business_probe",
            "query_id": "mock.snapshot_restored",
            "parameters": {
              "scenario_id": "F06-G"
            },
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "controlled-load",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 15
            },
            {
              "id": "no-checkout-5xx",
              "observation": "checkout_5xx_rate",
              "op": "eq",
              "value": 0
            },
            {
              "id": "business-absorbed",
              "observation": "business_ok",
              "op": "eq",
              "value": true
            },
            {
              "id": "transient-consumed",
              "observation": "transient_consumed_count",
              "op": "gte",
              "value": 1
            },
            {
              "id": "pulse-fresh",
              "observation": "pulse_age_seconds",
              "op": "lte",
              "value": 30
            },
            {
              "id": "no-duplicate-expectation",
              "observation": "duplicate_expectation_count",
              "op": "eq",
              "value": 0
            },
            {
              "id": "no-unconsumed-expiry",
              "observation": "expired_unconsumed_count",
              "op": "eq",
              "value": 0
            },
            {
              "id": "no-duplicate-payment-order",
              "observation": "payment_duplicate_order_count_since_t1",
              "op": "eq",
              "value": 0
            },
            {
              "id": "payment-remains-ready",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "user-impact",
              "observation": "checkout_5xx_rate",
              "op": "gt",
              "value": 0
            },
            {
              "id": "business-inconsistent",
              "observation": "business_ok",
              "op": "eq",
              "value": false
            },
            {
              "id": "duplicate-expectation",
              "observation": "duplicate_expectation_count",
              "op": "gt",
              "value": 0
            },
            {
              "id": "unconsumed-expiry",
              "observation": "expired_unconsumed_count",
              "op": "gt",
              "value": 0
            },
            {
              "id": "duplicate-payment-order",
              "observation": "payment_duplicate_order_count_since_t1",
              "op": "gt",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "pod-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            },
            {
              "id": "checkout-5xx-visible",
              "observation": "checkout_5xx_rate",
              "op": "gt",
              "value": 0
            },
            {
              "id": "pulse-stale",
              "observation": "pulse_age_seconds",
              "op": "gt",
              "value": 30
            },
            {
              "id": "duplicate-expectation-detected",
              "observation": "duplicate_expectation_count",
              "op": "gt",
              "value": 0
            },
            {
              "id": "unconsumed-expiry-detected",
              "observation": "expired_unconsumed_count",
              "op": "gt",
              "value": 0
            },
            {
              "id": "duplicate-payment-order-detected",
              "observation": "payment_duplicate_order_count_since_t1",
              "op": "gt",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "transient-expectation-absent",
              "observation": "expectation_absent",
              "op": "eq",
              "value": true
            },
            {
              "id": "snapshot-restored",
              "observation": "snapshot_restored",
              "op": "eq",
              "value": true
            },
            {
              "id": "expectation-duplicates-remain-zero",
              "observation": "duplicate_expectation_count",
              "op": "eq",
              "value": 0
            },
            {
              "id": "payment-order-duplicates-remain-zero",
              "observation": "payment_duplicate_order_count_since_t1",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "2h",
          "post_window": "45m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "mock.expectation",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "mock.expectation",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "mock.expectation"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-2h,t2+45m]",
    "export_not_before": "t2+45m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+45m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
