{
  "schema_version": "1.0",
  "id": "F02-R",
  "slug": "f02-r-pg-product-index-drop",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "tb-runner",
    "matrix_location_transport": "R/ssh → PG NodePort",
    "transport": "ssh",
    "profile_refs": [
      "injector-profiles/db.ddl",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-ssh-access",
      "db-inverse-ddl-ready",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "db.ddl",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "db.ddl"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "12m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f02-r",
              "parameters": {
                "engine": "postgresql",
                "db_host": "192.168.122.77",
                "db_port": 30432,
                "db_name": "commerce",
                "db_user": "commerce",
                "application_name": "rca-F02-R-index-ddl",
                "schema": "product_schema",
                "table": "products",
                "index": "idx_products_name",
                "expected_indexdef": "CREATE INDEX idx_products_name ON product_schema.products USING btree (name)",
                "minimum_rows": 2000
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "10m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce"
            },
            "freshness": "30s"
          },
          {
            "id": "index_present",
            "adapter": "database",
            "query_id": "database.index_present",
            "parameters": {
              "db_host": "192.168.122.77",
              "db_port": 30432,
              "db_name": "commerce",
              "db_user": "commerce",
              "schema": "product_schema",
              "table": "products",
              "index": "idx_products_name"
            },
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "index-absent",
              "observation": "index_present",
              "op": "eq",
              "value": false
            },
            {
              "id": "entry-reachable",
              "observation": "entry_status",
              "op": "ne",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "must_rule_out": {
          "any": [
            {
              "id": "global-entry-failure",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "global-pod-failure",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "pod-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "index-restored",
              "observation": "index_present",
              "op": "eq",
              "value": true
            },
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "db.ddl",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "db.ddl",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "db.ddl"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
