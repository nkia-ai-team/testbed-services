            },
            {
              "id": "food-restart-visible",
              "observation": "food_restart_count",
              "op": "gte",
              "value": 1
            },
            {
              "id": "commerce-checkout-impact",
              "observation": "entry_status",
              "op": "gte",
              "value": 500
            }
          ],
          "consecutive_ticks": 2
        },
        "escalate": {
          "all": [
            {
              "id": "food-oom-not-reached",
              "observation": "food_restart_count",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 4
        },
        "must_rule_out": {
          "any": [
            {
              "id": "single-root-food-only",
              "observation": "commerce_tagged_db_sessions",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
