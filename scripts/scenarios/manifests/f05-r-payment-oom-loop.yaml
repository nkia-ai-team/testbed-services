{
  "schema_version": "1.0",
  "id": "F05-R",
  "slug": "f05-r-payment-oom-loop",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "commerce namespace",
    "matrix_location_transport": "K/kubectl payment limit patch + R/ssh",
    "transport": "kubectl",
    "profile_refs": [
      "injector-profiles/k8s.resource",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-kubernetes-rbac",
      "kubernetes-original-resource-snapshot",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "k8s.resource",
        "companion_refs": [
          "load.north_south"
        ]
      },
      "runtime": {
        "mode": "calibration",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "30m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "adaptive_ladder",
          "levels": [
            {
              "id": "headroom-768mi",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-payment",
                "container": "payment-service",
                "resource": "memory",
                "baseline": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "1Gi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "512Mi"
                  }
                },
                "fault": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "768Mi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "512Mi"
                  }
                }
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "8m"
            },
            {
              "id": "measured-640mi",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-payment",
                "container": "payment-service",
                "resource": "memory",
                "baseline": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "1Gi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "512Mi"
                  }
                },
                "fault": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "640Mi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "512Mi"
                  }
                }
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "8m"
            },
            {
              "id": "deterministic-576mi",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-payment",
                "container": "payment-service",
                "resource": "memory",
                "baseline": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "1Gi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "512Mi"
                  }
                },
                "fault": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "576Mi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "512Mi"
                  }
                }
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "8m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "available_replicas",
            "adapter": "kubernetes",
            "query_id": "kubernetes.deployment_available_replicas",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "restart_count",
            "adapter": "kubernetes",
            "query_id": "kubernetes.container_restart_count",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment",
              "container": "payment-service"
            },
            "freshness": "30s"
          },
          {
            "id": "termination_reason",
            "adapter": "kubernetes",
            "query_id": "kubernetes.container_last_termination_reason",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment",
              "container": "payment-service"
            },
            "freshness": "30s"
          },
          {
            "id": "memory_limit",
            "adapter": "kubernetes",
            "query_id": "kubernetes.deployment_container_memory_limit",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment",
              "container": "payment-service"
            },
            "freshness": "30s"
          },
          {
            "id": "resources_match_baseline",
            "adapter": "kubernetes",
            "query_id": "kubernetes.deployment_resources_match_baseline",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment",
              "container": "payment-service"
            },
            "freshness": "30s"
          },
          {
            "id": "liveness_matches_baseline",
            "adapter": "kubernetes",
            "query_id": "kubernetes.deployment_liveness_probe_matches_baseline",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-payment",
              "container": "payment-service"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "checkout_5xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_5xx_rate",
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "controlled-load",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 30
            },
            {
              "id": "oom-loop-direct",
              "observation": "termination_reason",
              "op": "eq",
              "value": "OOMKilled"
            },
            {
              "id": "restart-visible",
              "observation": "restart_count",
              "op": "gte",
              "value": 1
            },
            {
              "id": "checkout-impact",
              "observation": "checkout_5xx_rate",
              "op": "gte",
              "value": 0.05
            },
            {
              "id": "liveness-unchanged",
              "observation": "liveness_matches_baseline",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2
        },
        "escalate": {
          "all": [
            {
              "id": "oom-not-reached",
              "observation": "restart_count",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 4
        },
        "must_rule_out": {
          "any": [
            {
              "id": "liveness-alternative",
              "observation": "liveness_matches_baseline",
              "op": "eq",
              "value": false
            },
            {
              "id": "non-oom-restart",
              "observation": "termination_reason",
              "op": "eq",
              "value": "Error"
            },
            {
              "id": "general-overload",
              "observation": "achieved_rps",
              "op": "gt",
              "value": 45
            }
          ],
          "consecutive_ticks": 1
        },
        "abort": {
          "any": [
            {
              "id": "restart-budget",
              "observation": "restart_count",
              "op": "gte",
              "value": 3
            },
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "pod-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 8
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "replica-recovered",
              "observation": "available_replicas",
              "op": "eq",
              "value": 1
            },
            {
              "id": "resources-restored",
              "observation": "resources_match_baseline",
              "op": "eq",
              "value": true
            },
            {
              "id": "memory-limit-restored",
              "observation": "memory_limit",
              "op": "eq",
              "value": "1Gi"
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "k8s.resource",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "k8s.resource",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "k8s.resource"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "verified payment memory ladder and OOMKilled observation",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
