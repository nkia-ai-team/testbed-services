            {
              "id": "pool-wait-latency",
              "observation": "payment_p95",
              "op": "gte",
              "value": 500
            },
            {
              "id": "checkout-impact",
              "observation": "checkout_5xx_rate",
              "op": "gte",
              "value": 0.05
            },
            {
              "id": "payment-still-ready",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "controlled-user-load",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 15
            }
          ],
          "consecutive_ticks": 3
        },
        "escalate": {
          "any": [
            {
              "id": "symptom-not-visible",
              "observation": "checkout_5xx_rate",
              "op": "lt",
              "value": 0.02
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "overload-not-pool",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 100
            }
          ],
          "consecutive_ticks": 3
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
