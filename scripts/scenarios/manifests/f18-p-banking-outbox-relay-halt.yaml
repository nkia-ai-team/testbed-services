{
  "schema_version": "1.0",
  "id": "F18-P",
  "slug": "f18-p-banking-outbox-relay-halt",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "banking namespace",
    "matrix_location_transport": "K/kubectl env-patch OUTBOX_RELAY_ENABLED=false + rollout (rca-testbed-banking)",
    "transport": "kubectl",
    "profile_refs": [
      "injector-profiles/k8s.env",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-kubernetes-rbac",
      "kubernetes-original-env-snapshot",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "k8s.env",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "k8s.env"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "15m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f18-p",
              "parameters": {
                "namespace": "rca-testbed-banking",
                "deployment": "testbed-transfer",
                "container": "transfer-service",
                "baseline": [
                  {
                    "name": "DB_USER",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "APP_USER",
                        "name": "oracle-secret"
                      }
                    }
                  },
                  {
                    "name": "DB_PASS",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "APP_USER_PASSWORD",
                        "name": "oracle-secret"
                      }
                    }
                  },
                  {
                    "name": "JAVA_TOOL_OPTIONS",
                    "value": "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
                  },
                  {
                    "name": "OTEL_SERVICE_NAME",
                    "value": "core-banking-transfer"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_ENDPOINT",
                    "value": "http://192.168.230.119:14317"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_PROTOCOL",
                    "value": "grpc"
                  },
                  {
                    "name": "OTEL_RESOURCE_ATTRIBUTES",
                    "value": "lucida.groupId=core-banking,lucida.target_id=f0ce5940-a7e2-44a2-843f-196de379d898"
                  },
                  {
                    "name": "OTEL_TRACES_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRICS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_LOGS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRIC_EXPORT_INTERVAL",
                    "value": "10000"
                  }
                ],
                "fault": [
                  {
                    "name": "DB_USER",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "APP_USER",
                        "name": "oracle-secret"
                      }
                    }
                  },
                  {
                    "name": "DB_PASS",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "APP_USER_PASSWORD",
                        "name": "oracle-secret"
                      }
                    }
                  },
                  {
                    "name": "JAVA_TOOL_OPTIONS",
                    "value": "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
                  },
                  {
                    "name": "OTEL_SERVICE_NAME",
                    "value": "core-banking-transfer"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_ENDPOINT",
                    "value": "http://192.168.230.119:14317"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_PROTOCOL",
                    "value": "grpc"
                  },
                  {
                    "name": "OTEL_RESOURCE_ATTRIBUTES",
                    "value": "lucida.groupId=core-banking,lucida.target_id=f0ce5940-a7e2-44a2-843f-196de379d898"
                  },
                  {
                    "name": "OTEL_TRACES_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRICS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_LOGS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRIC_EXPORT_INTERVAL",
                    "value": "10000"
                  },
                  {
                    "name": "OUTBOX_RELAY_ENABLED",
                    "value": "false"
                  }
                ]
              },
              "min_hold": "8m",
              "settle": "45s",
              "timeout": "13m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-banking",
              "resource": "testbed-transfer"
            },
            "freshness": "30s"
          },
          {
            "id": "transfer_2xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.transfer_2xx_rate",
            "freshness": "30s"
          },
          {
            "id": "outbox_unpublished",
            "adapter": "database",
            "query_id": "database.outbox_unpublished_count",
            "parameters": {
              "namespace": "rca-testbed-banking"
            },
            "freshness": "30s"
          },
          {
            "id": "ledger_consumer_lag",
            "adapter": "kubernetes",
            "query_id": "kubernetes.kafka_consumer_lag",
            "parameters": {
              "namespace": "rca-testbed-banking",
              "pod": "testbed-kafka-0",
              "bootstrap_server": "localhost:9092",
              "consumer_group": "ledger-service"
            },
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "outbox-backlog-growing",
              "observation": "outbox_unpublished",
              "op": "gt",
              "value": 20
            },
            {
              "id": "sync-transfers-unaffected",
              "observation": "transfer_2xx_rate",
              "op": "gte",
              "value": 0.95
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "consumer-lag-growing",
              "observation": "ledger_consumer_lag",
              "op": "gt",
              "value": 50,
              "_note": "if lag GROWS this is F04-R (consumer stop), not relay stop"
            },
            {
              "id": "transfer-pod-failure",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            },
            {
              "id": "external-rate-limit",
              "observation": "entry_status",
              "op": "eq",
              "value": 429
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "relay-restored-backlog-drained",
              "observation": "outbox_unpublished",
              "op": "eq",
              "value": 0
            },
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "k8s.env",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "k8s.env",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "k8s.env"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "verified transfer env snapshot; outbox count + banking kafka lag observation (runner 674c092)",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
