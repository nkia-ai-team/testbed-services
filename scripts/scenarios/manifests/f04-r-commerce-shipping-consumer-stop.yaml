{
  "schema_version": "1.0",
  "id": "F04-R",
  "slug": "f04-r-commerce-shipping-consumer-stop",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "commerce namespace",
    "matrix_location_transport": "K/kubectl scale shipping=0",
    "transport": "kubectl",
    "profile_refs": [
      "injector-profiles/kafka.control",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-kubernetes-rbac",
      "kafka-drain-capacity",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "kafka.control",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "kafka.control"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "15m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f04-r",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-shipping",
                "baseline_replicas": 1,
                "kafka_pod": "testbed-kafka-0",
                "bootstrap_server": "localhost:9092",
                "consumer_group": "shipping-service",
                "drain_timeout_seconds": 600
              },
              "min_hold": "8m",
              "settle": "30s",
              "timeout": "13m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-kafka-0"
            },
            "freshness": "30s"
          },
          {
            "id": "shipping_replicas",
            "adapter": "kubernetes",
            "query_id": "kubernetes.deployment_available_replicas",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-shipping"
            },
            "freshness": "30s"
          },
          {
            "id": "shipping_lag",
            "adapter": "kubernetes",
            "query_id": "kubernetes.kafka_consumer_lag",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "pod": "testbed-kafka-0",
              "bootstrap_server": "localhost:9092",
              "consumer_group": "shipping-service"
            },
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "shipping-stopped",
              "observation": "shipping_replicas",
              "op": "eq",
              "value": 0
            },
            {
              "id": "shipping-lag-observed",
              "observation": "shipping_lag",
              "op": "gt",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "must_rule_out": {
          "any": [
            {
              "id": "global-entry-failure",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "kafka-pod-failure",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "shipping-restored",
              "observation": "shipping_replicas",
              "op": "eq",
              "value": 1
            },
            {
              "id": "lag-drained",
              "observation": "shipping_lag",
              "op": "eq",
              "value": 0
            },
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "kafka-pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "kafka.control",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "kafka.control",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "kafka.control"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
