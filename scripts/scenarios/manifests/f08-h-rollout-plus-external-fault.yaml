{
  "schema_version": "1.0",
  "id": "F08-H",
  "slug": "f08-h-rollout-plus-external-fault",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "scenario-runner",
    "matrix_location_transport": "K/kubectl rollout + MockServer API",
    "transport": "local-orchestrator",
    "profile_refs": [
      "injector-profiles/timeline.compose",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-local-runner-state",
      "subinjection-timeline",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "timeline.compose",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "timeline.compose"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "12m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f08-h",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-payment",
                "annotation_key": "rca.lucida.ai/f08-h-rollout",
                "mock_resource": "deployment/testbed-external-pg-mock",
                "mock_path": "/v1/payments",
                "mock_status": 429,
                "second_fault_offset_seconds": 15
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "10m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "business_ok",
            "adapter": "business_probe",
            "query_id": "business.checkout_invariant",
            "freshness": "60s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "checkout-impact",
              "observation": "entry_status",
              "op": "gte",
              "value": 400
            },
            {
              "id": "rollout-remains-ready",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "business-impact",
              "observation": "business_ok",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "must_rule_out": {
          "any": [
            {
              "id": "rollout-alternative",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 3
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "pod-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "timeline.compose",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "timeline.compose",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "timeline.compose"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
