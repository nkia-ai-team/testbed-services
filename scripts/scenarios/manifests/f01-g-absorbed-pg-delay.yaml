{
  "schema_version": "1.0",
  "id": "F01-G",
  "slug": "f01-g-absorbed-pg-delay",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "commerce external-pg-mock",
    "matrix_location_transport": "K/kubectl → commerce MockServer API",
    "transport": "api-via-kubectl",
    "profile_refs": [
      "injector-profiles/mock.expectation",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-api-contract",
      "mock-restore-contract",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "mock.expectation",
        "companion_refs": [
          "load.north_south"
        ]
      },
      "runtime": {
        "mode": "calibration",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "30m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "adaptive_ladder",
          "levels": [
            {
              "id": "absorbed-delay-1s",
              "parameters": {
                "path": "/v1/payments",
                "mode": "delay",
                "status_code": 200,
                "delay_seconds": 1
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "8m"
            },
            {
              "id": "absorbed-delay-3s",
              "parameters": {
                "path": "/v1/payments",
                "mode": "delay",
                "status_code": 200,
                "delay_seconds": 3
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "8m"
            },
            {
              "id": "absorbed-delay-5s",
              "parameters": {
                "path": "/v1/payments",
                "mode": "delay",
                "status_code": 200,
                "delay_seconds": 5
              },
              "min_hold": "2m",
              "settle": "30s",
              "timeout": "8m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "checkout_5xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_5xx_rate",
            "freshness": "30s"
          },
          {
            "id": "user_p95",
            "adapter": "prometheus",
            "query_id": "prometheus.apm_service_p95",
            "parameters": {
              "service_name": "commerce-gateway"
            },
            "freshness": "120s"
          },
          {
            "id": "business_ok",
            "adapter": "business_probe",
            "query_id": "business.checkout_invariant",
            "freshness": "60s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "controlled-load",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 15
            },
            {
              "id": "delay-visible",
              "observation": "user_p95",
              "op": "gte",
              "value": 500
            },
            {
              "id": "no-checkout-5xx",
              "observation": "checkout_5xx_rate",
              "op": "eq",
              "value": 0
            },
            {
              "id": "entry-reachable",
              "observation": "entry_status",
              "op": "ne",
              "value": 0
            },
            {
              "id": "business-absorbed",
              "observation": "business_ok",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 3
        },
        "escalate": {
          "all": [
            {
              "id": "delay-not-visible",
              "observation": "user_p95",
              "op": "lt",
              "value": 500
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "user-impact",
              "observation": "checkout_5xx_rate",
              "op": "gt",
              "value": 0
            },
            {
              "id": "business-inconsistent",
              "observation": "business_ok",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "pod-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "mock.expectation",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "mock.expectation",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "mock.expectation"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
