{
  "schema_version": "1.0",
  "id": "F15-G",
  "slug": "f15-g-dual-db-lock-multiroot",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "scenario-runner",
    "matrix_location_transport": "R/ssh 두 DB NodePort",
    "transport": "local-orchestrator",
    "profile_refs": [
      "injector-profiles/timeline.multi",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-local-runner-state",
      "subinjection-timeline",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "timeline.multi",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "timeline.multi"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "12m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "must_rule_out": {
          "any": [
            {
              "id": "single-root-only",
              "observation": "tagged_oracle_sessions",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 3
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f15-g",
              "parameters": {
                "steps": [
                  {
                    "name": "commerce-inventory-lock",
                    "kind": "pg_lock",
                    "offset_seconds": 0,
                    "db_host": "192.168.122.77",
                    "db_port": 30432,
                    "db_name": "commerce",
                    "db_user": "commerce",
                    "schema": "inventory_schema",
                    "table": "inventory",
                    "key_column": "product_id",
                    "key_value": 1,
                    "application_name": "rca-F15-G-inventory-lock",
                    "hold_seconds": 600
                  },
                  {
                    "name": "banking-settlement-lock",
                    "kind": "oracle_lock",
                    "offset_seconds": 0,
                    "namespace": "rca-testbed-banking",
                    "pod": "testbed-oracle-0",
                    "schema": "BANKING",
                    "table": "accounts",
                    "key_column": "id",
                    "key_value": "commerce-settlement",
                    "client_identifier": "rca-F15-G-oracle-lock",
                    "hold_seconds": 600
                  }
                ]
              },
              "min_hold": "4m",
              "settle": "30s",
              "timeout": "10m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-payment"
            },
            "freshness": "30s"
          },
          {
            "id": "tagged_pg_sessions",
            "adapter": "database",
            "query_id": "database.tagged_session_count",
            "parameters": {
              "scenario_tag": "rca-F15-G-inventory-lock"
            },
            "freshness": "30s"
          },
          {
            "id": "tagged_oracle_sessions",
            "adapter": "database",
            "query_id": "database.tagged_session_count",
            "parameters": {
              "scenario_tag": "rca-F15-G-oracle-lock"
            },
            "freshness": "30s"
          },
          {
            "id": "checkout_5xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_5xx_rate",
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "pg-root-present",
              "observation": "tagged_pg_sessions",
              "op": "gt",
              "value": 0
            },
            {
              "id": "oracle-root-present",
              "observation": "tagged_oracle_sessions",
              "op": "gt",
              "value": 0
            },
            {
              "id": "checkout-impact",
              "observation": "checkout_5xx_rate",
              "op": "gte",
              "value": 0.05
            }
          ],
          "consecutive_ticks": 3
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "pg-cleared",
              "observation": "tagged_pg_sessions",
              "op": "eq",
              "value": 0
            },
            {
              "id": "oracle-cleared",
              "observation": "tagged_oracle_sessions",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "timeline.multi",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "timeline.multi",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "timeline.multi"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "none",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
