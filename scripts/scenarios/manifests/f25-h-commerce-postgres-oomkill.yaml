{
  "schema_version": "1.0",
  "id": "F25-H",
  "slug": "f25-h-commerce-postgres-oomkill",
  "readiness": "ready",
  "authoritative_sources": {
    "catalog": "scripts/scenarios/catalog.json",
    "execution_matrix": "docs/spec-scenario-execution-matrix.md"
  },
  "injection": {
    "location": "commerce namespace",
    "matrix_location_transport": "K/kubectl postgres StatefulSet mem limit patch(512Mi→320Mi) + R/ssh load.north_south checkout companion",
    "transport": "kubectl",
    "profile_refs": [
      "injector-profiles/k8s.resource",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-kubernetes-rbac",
      "kubernetes-original-resource-snapshot",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "k8s.resource",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "k8s.resource"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "15m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f25-h",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-postgres",
                "container": "postgres",
                "resource": "memory",
                "baseline": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "512Mi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "256Mi"
                  }
                },
                "fault": {
                  "limits": {
                    "cpu": "500m",
                    "memory": "320Mi"
                  },
                  "requests": {
                    "cpu": "200m",
                    "memory": "256Mi"
                  }
                }
              },
              "min_hold": "8m",
              "settle": "30s",
              "timeout": "13m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-postgres"
            },
            "freshness": "30s"
          },
          {
            "id": "pg_restart_count",
            "adapter": "kubernetes",
            "query_id": "kubernetes.container_restart_count",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-postgres",
              "container": "postgres"
            },
            "freshness": "30s"
          },
          {
            "id": "pg_termination_reason",
            "adapter": "kubernetes",
            "query_id": "kubernetes.container_last_termination_reason",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-postgres",
              "container": "postgres"
            },
            "freshness": "30s"
          },
          {
            "id": "pg_mem_current",
            "adapter": "kubernetes",
            "query_id": "kubernetes.container_memory_current_bytes",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "deployment": "testbed-postgres",
              "container": "postgres"
            },
            "freshness": "30s"
          },
          {
            "id": "achieved_rps",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.achieved_rps",
            "freshness": "30s"
          },
          {
            "id": "checkout_5xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_5xx_rate",
            "freshness": "30s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "oom-direct",
              "observation": "pg_termination_reason",
              "op": "eq",
              "value": "OOMKilled"
            },
            {
              "id": "restart-visible",
              "observation": "pg_restart_count",
              "op": "gte",
              "value": 1
            },
            {
              "id": "checkout-impact",
              "observation": "checkout_5xx_rate",
              "op": "gte",
              "value": 0.1
            }
          ],
          "consecutive_ticks": 2
        },
        "must_rule_out": {
          "any": [
            {
              "id": "postgres-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 2
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            },
            {
              "id": "restart-budget",
              "observation": "pg_restart_count",
              "op": "gte",
              "value": 6
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "checkout-recovered",
              "observation": "checkout_5xx_rate",
              "op": "lt",
              "value": 0.05
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "k8s.resource",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "k8s.resource",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "k8s.resource"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "postgres StatefulSet kind 일반화(k8s_resource_executor) + postgres 관측 allowlist(live_probes.py F25_H_POSTGRES_TARGET) 배선 완료(07-24)",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
