  "injection": {
    "location": "commerce namespace",
    "matrix_location_transport": "K/kubectl testbed-inventory env(SPRING_APPLICATION_JSON interval-ms) stopgap + R/ssh load.north_south checkout companion",
    "transport": "kubectl",
    "profile_refs": [
      "injector-profiles/k8s.env",
      "injector-profiles/load.north_south"
    ]
  },
  "execution": {
    "preflight_ids": [
      "catalog-integrity",
      "canonical-kubeconfig",
      "global-dirty-lease",
      "baseline-clean-window",
      "target-health",
      "profile-prerequisites",
      "transport-kubernetes-rbac",
      "kubernetes-original-env-snapshot",
      "baseline-loadgen-active"
    ],
    "controller": {
      "dispatcher_mode": "trusted",
      "live_enabled": true,
      "binding": {
        "primary_ref": "k8s.env",
        "companion_refs": [
          "load.north_south"
        ],
        "approved_profile_id": "k8s.env"
      },
      "runtime": {
        "mode": "evaluation",
        "tick_interval": "15s",
        "settle_after_change": "30s",
        "max_injection_duration": "20m",
        "preflight": [
          "kube-context",
          "kube-node-set",
          "coordinator-clean",
          "clean-window",
          "baseline-traffic",
          "target-health"
        ],
        "baseline": {
          "clean_window": "30m",
          "required": [
            {
              "check": "coordinator-clean"
            },
            {
              "check": "clean-window"
            },
            {
              "check": "baseline-traffic"
            },
            {
              "check": "target-health"
            }
          ]
        },
        "profile": {
          "kind": "fixed",
          "levels": [
            {
              "id": "approved-fixed-f23-r",
              "parameters": {
                "namespace": "rca-testbed-commerce",
                "deployment": "testbed-inventory",
                "container": "inventory-service",
                "baseline": [
                  {
                    "name": "DB_USER",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "POSTGRES_USER",
                        "name": "postgres-secret"
                      }
                    }
                  },
                  {
                    "name": "DB_PASS",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "POSTGRES_PASSWORD",
                        "name": "postgres-secret"
                      }
                    }
                  },
                  {
                    "name": "JAVA_TOOL_OPTIONS",
                    "value": "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
                  },
                  {
                    "name": "OTEL_SERVICE_NAME",
                    "value": "commerce-inventory"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_ENDPOINT",
                    "value": "http://192.168.230.119:14317"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_PROTOCOL",
                    "value": "grpc"
                  },
                  {
                    "name": "OTEL_RESOURCE_ATTRIBUTES",
                    "value": "lucida.groupId=commerce,lucida.target_id=414db206-d121-43b1-886c-78b240d23a7a"
                  },
                  {
                    "name": "OTEL_TRACES_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRICS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_LOGS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRIC_EXPORT_INTERVAL",
                    "value": "10000"
                  }
                ],
                "fault": [
                  {
                    "name": "DB_USER",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "POSTGRES_USER",
                        "name": "postgres-secret"
                      }
                    }
                  },
                  {
                    "name": "DB_PASS",
                    "valueFrom": {
                      "secretKeyRef": {
                        "key": "POSTGRES_PASSWORD",
                        "name": "postgres-secret"
                      }
                    }
                  },
                  {
                    "name": "JAVA_TOOL_OPTIONS",
                    "value": "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
                  },
                  {
                    "name": "OTEL_SERVICE_NAME",
                    "value": "commerce-inventory"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_ENDPOINT",
                    "value": "http://192.168.230.119:14317"
                  },
                  {
                    "name": "OTEL_EXPORTER_OTLP_PROTOCOL",
                    "value": "grpc"
                  },
                  {
                    "name": "OTEL_RESOURCE_ATTRIBUTES",
                    "value": "lucida.groupId=commerce,lucida.target_id=414db206-d121-43b1-886c-78b240d23a7a"
                  },
                  {
                    "name": "OTEL_TRACES_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRICS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_LOGS_EXPORTER",
                    "value": "otlp"
                  },
                  {
                    "name": "OTEL_METRIC_EXPORT_INTERVAL",
                    "value": "10000"
                  },
                  {
                    "name": "SPRING_APPLICATION_JSON",
                    "value": "{\"inventory\":{\"reconciliation\":{\"interval-ms\":999999999}}}"
                  }
                ]
              },
              "min_hold": "12m",
              "settle": "30s",
              "timeout": "18m"
            }
          ]
        },
        "observations": [
          {
            "id": "entry_status",
            "adapter": "http_probe",
            "query_id": "http.entry_health",
            "freshness": "15s"
          },
          {
            "id": "target_health",
            "adapter": "http_probe",
            "query_id": "http.target_health",
            "freshness": "15s"
          },
          {
            "id": "pod_ready",
            "adapter": "kubernetes",
            "query_id": "kubernetes.pod_ready",
            "parameters": {
              "namespace": "rca-testbed-commerce",
              "resource": "testbed-inventory"
            },
            "freshness": "30s"
          },
          {
            "id": "checkout_409_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_409_rate",
            "freshness": "30s"
          },
          {
            "id": "checkout_5xx_rate",
            "adapter": "loadgen_summary",
            "query_id": "loadgen.checkout_5xx_rate",
            "freshness": "30s"
          },
          {
            "id": "stock_zero_count",
            "adapter": "database",
            "query_id": "database.inventory_stock_level",
            "parameters": {
              "db_host": "192.168.122.77",
              "db_port": 30432,
              "db_name": "commerce",
              "db_user": "commerce",
              "schema": "inventory_schema",
              "table": "inventory"
            },
            "freshness": "30s"
          },
          {
            "id": "restock_movement_count",
            "adapter": "database",
            "query_id": "database.restock_movement_rate",
            "parameters": {
              "db_host": "192.168.122.77",
              "db_port": 30432,
              "db_name": "commerce",
              "db_user": "commerce",
              "schema": "inventory_schema",
              "table": "inventory_movements",
              "movement_type": "RESTOCK",
              "window_minutes": 12
            },
            "freshness": "60s"
          }
        ],
        "success": {
          "all": [
            {
              "id": "checkout-409-up",
              "observation": "checkout_409_rate",
              "op": "gte",
              "value": 0.3
            },
            {
              "id": "stock-depleted",
              "observation": "stock_zero_count",
              "op": "gte",
              "value": 1
            },
            {
              "id": "restock-halted",
              "observation": "restock_movement_count",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "checkout-5xx-elevated",
              "observation": "checkout_5xx_rate",
              "op": "gte",
              "value": 0.05
            },
            {
              "id": "inventory-unready",
              "observation": "pod_ready",
              "op": "eq",
              "value": false
            }
          ],
          "consecutive_ticks": 3
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
          "all": [
            {
              "id": "target-recovered",
              "observation": "target_health",
              "op": "eq",
              "value": 200
            },
            {
              "id": "pod-recovered",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "restock-resumed",
              "observation": "restock_movement_count",
              "op": "gt",
              "value": 0
            }
          ],
          "consecutive_ticks": 2,
          "timeout": "10m"
        },
        "cleanup": {
          "required": true,
          "order": "reverse",
          "timeout": "10m"
        },
        "capture": {
          "enabled": true,
          "pre_window": "10m",
          "post_window": "20m",
          "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json",
          "create_golden_anomaly": false
        }
      }
    }
  },
  "actions": {
    "plan": {
      "mode": "dry-run",
      "mutation": false,
      "adapter_refs": [
        "k8s.env",
        "load.north_south"
      ]
    },
    "run": {
      "mode": "dry-run",
      "mutation": false,
      "requires_preflight": true,
      "adapter_refs": [
        "k8s.env",
        "load.north_south"
      ]
    },
    "cleanup": {
      "mode": "dry-run",
      "mutation": false,
      "required": true,
      "order": "reverse",
      "recovery_gate": true,
      "adapter_refs": [
        "load.north_south",
        "k8s.env"
      ]
    }
  },
  "prerequisite_gate": {
    "state": "satisfied",
    "required": false,
    "description": "k8s.env interval-ms stopgap 배선 + database.inventory_stock_level/restock_movement_rate/loadgen.checkout_409_rate 관측 배선 완료(07-24)",
    "live_allowed": true
  },
  "capture_policy": {
    "policy_ref": "focused-window-v1",
    "time_basis": "UTC",
    "t1": "earliest-actual-effect-start",
    "t2": "latest-load-end-or-fault-release",
    "query_window": "[t1-10m,t2+20m]",
    "export_not_before": "t2+20m",
    "model_snapshot": "/var/lib/lucida/ai-models/stream-anomaly/global/v1/model.json@t2+20m",
    "create_golden_anomaly": false,
    "allowed_case_labels": [
      "calibration",
      "evaluation",
      "failed"
    ]
  }
}
