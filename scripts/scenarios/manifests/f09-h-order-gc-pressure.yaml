              "id": "gc-pause-visible",
              "observation": "order_p95",
              "op": "gte",
              "value": 400
            },
            {
              "id": "order-still-ready",
              "observation": "pod_ready",
              "op": "eq",
              "value": true
            },
            {
              "id": "no-oom",
              "observation": "order_restart_count",
              "op": "eq",
              "value": 0
            },
            {
              "id": "controlled-user-load",
              "observation": "achieved_rps",
              "op": "gte",
              "value": 15
            }
          ],
          "consecutive_ticks": 3
        },
        "escalate": {
          "any": [
            {
              "id": "pause-not-yet-visible",
              "observation": "order_p95",
              "op": "lt",
              "value": 400
            }
          ],
          "consecutive_ticks": 3
        },
        "must_rule_out": {
          "any": [
            {
              "id": "crossed-into-oom",
              "observation": "order_restart_count",
              "op": "gt",
              "value": 0
            }
          ],
          "consecutive_ticks": 1
        },
        "abort": {
          "any": [
            {
              "id": "entry-unreachable",
              "observation": "entry_status",
              "op": "eq",
              "value": 0
            }
          ],
          "consecutive_ticks": 2
        },
        "recovery": {
