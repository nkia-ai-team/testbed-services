# Local dev compose — runs the full core-banking stack on localhost for engineer iteration.
# Production deployment uses k8s/ manifests instead.

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: root1234
      APP_USER: banking
      APP_USER_PASSWORD: banking1234
    ports:
      - "11521:1521"
    volumes:
      - ./db/init.sql:/container-entrypoint-initdb.d/01-init.sql
      - ./db/seed-all.sql:/container-entrypoint-initdb.d/02-seed-all.sql
      - oracledata:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # CONTROLLER 도 advertised.listeners 에 포함 필요(실기동 검증 중 발견 — k8s/11-kafka.yaml 주석 참조)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: rca-testbed-banking-kafka-1

  api:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    image: core-banking-api:latest
    environment:
      ACCOUNT_SERVICE_URL: http://account:8081
    ports:
      - "8080:8080"
    depends_on:
      - account

  account:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    image: core-banking-account:latest
    environment:
      DB_HOST: oracle
      DB_PORT: "1521"
      DB_SERVICE: FREEPDB1
      DB_USER: banking
      DB_PASS: banking1234
      TRANSFER_SERVICE_URL: http://transfer:8082
    ports:
      - "8081:8081"
    depends_on:
      oracle:
        condition: service_healthy
      transfer:
        condition: service_started

  transfer:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    image: core-banking-transfer:latest
    environment:
      DB_HOST: oracle
      DB_PORT: "1521"
      DB_SERVICE: FREEPDB1
      DB_USER: banking
      DB_PASS: banking1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started

  ledger:
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    image: core-banking-ledger:latest
    environment:
      DB_HOST: oracle
      DB_PORT: "1521"
      DB_SERVICE: FREEPDB1
      DB_USER: banking
      DB_PASS: banking1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  oracledata:
