server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:FREEPDB1}
    username: ${DB_USER:banking}
    password: ${DB_PASS:banking1234}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      connection-timeout: 3000
      idle-timeout: 60000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    open-in-view: false

services:
  transfer:
    url: ${TRANSFER_SERVICE_URL:http://testbed-transfer:8082}
    connect-timeout: 3s
    read-timeout: 15s

resilience4j:
  circuitbreaker:
    instances:
      transferClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      transferClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

management:
  health:
    kafka:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
