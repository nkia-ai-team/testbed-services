apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-ledger
  namespace: rca-testbed-banking
  labels:
    app: testbed-ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-ledger
  template:
    metadata:
      labels:
        app: testbed-ledger
    spec:
      containers:
        - name: ledger-service
          image: core-banking-ledger:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-secret
                  key: APP_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: oracle-secret
                  key: APP_USER_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-ledger
  namespace: rca-testbed-banking
spec:
  selector:
    app: testbed-ledger
  ports:
    - port: 8083
      targetPort: 8083
