# Redis — 이체 이벤트 스트림(transfer-service publish → ledger-service consume).
# 테스트베드라 데이터 유실 무관 → PVC 없는 Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-redis
  namespace: rca-testbed-banking
  labels:
    app: testbed-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-redis
  template:
    metadata:
      labels:
        app: testbed-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-redis
  namespace: rca-testbed-banking
spec:
  selector:
    app: testbed-redis
  ports:
    - port: 6379
      targetPort: 6379
