apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-transfer
  namespace: rca-testbed-banking
  labels:
    app: testbed-transfer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-transfer
  template:
    metadata:
      labels:
        app: testbed-transfer
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: DirectoryOrCreate
        - name: wpm-agent
          hostPath:
            path: /opt/polestar10/wpm
            type: DirectoryOrCreate
      containers:
        - name: transfer-service
          image: core-banking-transfer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true
            - name: wpm-agent
              mountPath: /opt/wpm
              readOnly: true
          envFrom:
            - configMapRef:
                name: service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MARIADB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MARIADB_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/wpm/template/wpmagent.jar -Dwpm.config=/opt/wpm/transfer/wpmagent.conf -javaagent:/opt/apm/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "${OTLP_ENDPOINT}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.organizationId=${POLESTAR_ORG_ID},lucida.groupId=core-banking,lucida.target_id=${TRANSFER_TARGET_ID}"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
            - name: OTEL_SERVICE_NAME
              value: "core-banking-transfer"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-transfer
  namespace: rca-testbed-banking
spec:
  selector:
    app: testbed-transfer
  ports:
    - port: 8082
      targetPort: 8082
