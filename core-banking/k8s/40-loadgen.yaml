# 상주 부하 생성기(k6). 시나리오(장애 주입)와 별개 — 평상시 저율 트래픽을 끊김 없이 발생시킨다.
# 스크립트는 loadgen-scripts ConfigMap(build-and-deploy.sh Phase 2.5 가 loadgen/*.{js,sh} 원본에서 생성)에서 마운트.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-loadgen
  namespace: rca-testbed-banking
  labels:
    app: testbed-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-loadgen
  template:
    metadata:
      labels:
        app: testbed-loadgen
    spec:
      containers:
        - name: loadgen
          image: grafana/k6:latest
          command: ["sh", "/scripts/entrypoint.sh"]
          env:
            - name: GATEWAY_URL
              value: "http://testbed-nginx"
            - name: PEAK_RPS
              value: "4"
            - name: TROUGH_RPS
              value: "1"
            - name: LOADGEN_SEED
              value: "42"
            - name: PRE_ALLOCATED_VUS
              value: "10"
            - name: MAX_VUS
              value: "30"
            - name: SCRIPT_PATH
              value: "/scripts/script.js"
          volumeMounts:
            - name: loadgen-scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: loadgen-scripts
          configMap:
            name: loadgen-scripts
            defaultMode: 0755
