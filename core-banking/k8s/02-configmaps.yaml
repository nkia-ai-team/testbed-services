# 서비스 공통 환경변수
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: rca-testbed-banking
data:
  DB_HOST: testbed-oracle
  DB_PORT: "1521"
  DB_SERVICE: FREEPDB1

  KAFKA_BOOTSTRAP_SERVERS: testbed-kafka:9092

  ACCOUNT_SERVICE_URL: http://testbed-account:8081
  TRANSFER_SERVICE_URL: http://testbed-transfer:8082
---
# Nginx reverse proxy (게이트웨이). 외부 진입은 api-service 로.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: rca-testbed-banking
data:
  default.conf: |
    upstream api-service {
        server testbed-api:8080;
    }
    upstream transfer-service {
        server testbed-transfer:8082;
    }
    upstream account-service {
        server testbed-account:8081;
    }

    server {
        listen 80;

        location /api/transfers {
            proxy_pass http://api-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/accounts {
            proxy_pass http://account-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 'ok';
        }
    }
