apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: testbed-mariadb
  namespace: rca-testbed-banking
  labels:
    app: testbed-mariadb
spec:
  serviceName: testbed-mariadb
  replicas: 1
  selector:
    matchLabels:
      app: testbed-mariadb
  template:
    metadata:
      labels:
        app: testbed-mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mariadb-secret
          volumeMounts:
            - name: mariadbdata
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mariadb-admin ping -h 127.0.0.1 -uroot -p${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: mariadb-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: mariadbdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-mariadb
  namespace: rca-testbed-banking
spec:
  selector:
    app: testbed-mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
# DPM(db_poll) 접속용 외부 NodePort. 30307 = 미사용 값(PG 30432/30232, MySQL 30306 와 충돌 회피).
apiVersion: v1
kind: Service
metadata:
  name: testbed-mariadb-external
  namespace: rca-testbed-banking
spec:
  type: NodePort
  selector:
    app: testbed-mariadb
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 30307
