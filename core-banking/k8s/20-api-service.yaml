apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-api
  namespace: rca-testbed-banking
  labels:
    app: testbed-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-api
  template:
    metadata:
      labels:
        app: testbed-api
    spec:
      containers:
        - name: api-service
          image: core-banking-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: service-config
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-api
  namespace: rca-testbed-banking
spec:
  selector:
    app: testbed-api
  ports:
    - port: 8080
      targetPort: 8080
