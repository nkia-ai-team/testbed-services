server:
  port: 8082

spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:FREEPDB1}
    username: ${DB_USER:banking}
    password: ${DB_PASS:banking1234}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000
      idle-timeout: 60000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: transfer-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

outbox:
  relay:
    enabled: true

topics:
  transfers: banking.transfers

transfer:
  cleanup:
    interval-ms: ${TRANSFER_CLEANUP_INTERVAL_MS:600000}
    stale-after-minutes: ${TRANSFER_STALE_AFTER_MINUTES:30}

management:
  health:
    kafka:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
