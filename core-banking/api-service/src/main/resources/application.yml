server:
  port: 8080

spring:
  application:
    name: api-service

services:
  account:
    url: ${ACCOUNT_SERVICE_URL:http://testbed-account:8081}
    connect-timeout: 3s
    read-timeout: 10s

resilience4j:
  circuitbreaker:
    instances:
      accountClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      accountClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

management:
  health:
    kafka:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
