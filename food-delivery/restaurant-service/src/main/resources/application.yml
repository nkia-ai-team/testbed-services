server:
  port: 8081

spring:
  application:
    name: restaurant-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:fooddelivery}
    username: ${POSTGRES_USER:fooddelivery}
    password: ${POSTGRES_PASSWORD:fooddelivery1234}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
