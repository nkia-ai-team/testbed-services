server:
  port: 8082

spring:
  application:
    name: dispatch-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fooddelivery}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:fooddelivery}
    password: ${DB_PASSWORD:fooddelivery1234}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 60000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

services:
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8080}
    connect-timeout: 3s
    read-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: false

outbox:
  relay:
    enabled: true

topics:
  dispatch: food.dispatch

resilience4j:
  circuitbreaker:
    instances:
      order:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.fooddelivery.common.exception.ClientErrorException
  retry:
    instances:
      order:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.fooddelivery.common.exception.ClientErrorException

dispatch:
  # 정상 수요를 감당하는 크기여야 한다: baseline 주문 ~1/s × 평균 ETA 25분 ≈ 동시 배차
  # 1,500 (Little's law). 50이던 시절엔 처리량이 분당 2건뿐이라 주문이 상시 100% 503으로
  # 거절됐다(2026-07-15 용량 프로브에서 발견 — spec-scenario-load §8.2 결함 4).
  # 배차 부족 시나리오는 이 env를 낮춰 재현한다.
  max-capacity: ${DISPATCH_MAX_CAPACITY:2000}
