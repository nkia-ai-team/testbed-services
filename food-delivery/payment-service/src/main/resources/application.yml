server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fooddelivery}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:fooddelivery}
    password: ${DB_PASSWORD:fooddelivery1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

services:
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8080}
    connect-timeout: 3s
    read-timeout: 10s

pg:
  api:
    base-url: ${PG_API_URL:http://localhost:9090}
    connect-timeout: 3s
    read-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
