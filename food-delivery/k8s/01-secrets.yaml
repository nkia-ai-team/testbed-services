apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: rca-testbed-food
type: Opaque
stringData:
  # MySQL 컨테이너 초기화용 (envFrom 으로 mysql:8.0 에 주입 → DB/유저 자동 생성)
  MYSQL_DATABASE: fooddelivery
  MYSQL_USER: fooddelivery
  MYSQL_PASSWORD: fooddelivery1234
  MYSQL_ROOT_PASSWORD: rootpassword1234
