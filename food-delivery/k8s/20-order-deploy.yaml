apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-order
  namespace: rca-testbed-food
  labels:
    app: testbed-order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-order
  template:
    metadata:
      labels:
        app: testbed-order
    spec:
      containers:
        - name: order-service
          image: food-delivery-order:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-order
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-order
  ports:
    - port: 8080
      targetPort: 8080
