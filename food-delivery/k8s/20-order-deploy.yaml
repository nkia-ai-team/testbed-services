apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-order
  namespace: rca-testbed-food
  labels:
    app: testbed-order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-order
  template:
    metadata:
      labels:
        app: testbed-order
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: Directory
      containers:
        - name: order-service
          image: food-delivery-order:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: service-config
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: "food-delivery-order"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://192.168.230.119:14317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.groupId=food-delivery,lucida.target_id=fa8b5cc4-6c43-45bf-b388-a4b245fade2d"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-order
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-order
  ports:
    - port: 8080
      targetPort: 8080
---
# tb-runner(클러스터 밖) loadgen용 외부 진입점 — food-delivery는 nginx 정문이 없어
# loadgen이 치는 서비스 3개(order/restaurant/dispatch)를 NodePort로 개별 노출한다.
apiVersion: v1
kind: Service
metadata:
  name: testbed-order-external
  namespace: rca-testbed-food
spec:
  type: NodePort
  selector:
    app: testbed-order
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30180
