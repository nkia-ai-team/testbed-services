apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: testbed-postgres
  namespace: rca-testbed-food
  labels:
    app: testbed-postgres
spec:
  serviceName: testbed-postgres
  replicas: 1
  selector:
    matchLabels:
      app: testbed-postgres
  template:
    metadata:
      labels:
        app: testbed-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-postgres
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-postgres-external
  namespace: rca-testbed-food
spec:
  type: NodePort
  selector:
    app: testbed-postgres
  ports:
    - port: 5432
      targetPort: 5432
      # k3d serverlb 는 30200-30299 만 호스트로 포워딩. 이 범위를 벗어나면
      # 호스트/외부(DPM 관제 서버)에서 PG 에 닿지 못함.
      nodePort: 30232
