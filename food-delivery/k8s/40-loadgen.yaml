# ============================================================
# 지속 부하 생성기(loadgen) — §8. 상시 Deployment.
# ============================================================
# 시나리오(장애 주입)와 별개인 baseline 트래픽 생성기. Java 모듈이 아니라 공식 grafana/k6
# 이미지를 그대로 쓴다(로컬 빌드/이미지 임포트 대상 아님 — build-and-deploy.sh의 SERVICES
# 배열에도 포함시키지 않는다). food-delivery 에는 api-gateway 가 없어 각 서비스를
# k8s Service DNS로 직접 호출한다(commerce 는 게이트웨이 단일 진입점).
#
# 스크립트(script.js/entrypoint.sh)는 이 YAML에 내용을 베껴 넣지 않고 loadgen-scripts
# ConfigMap으로 마운트한다. 그 ConfigMap 자체는 build-and-deploy.sh의 Phase 2.5가
# food-delivery/loadgen/*.js·*.sh 파일에서 `kubectl create configmap --from-file`로 직접
# 생성한다(mysql-init-scripts 와 동일한 이유 — 파일-ConfigMap 드리프트 방지).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-loadgen
  namespace: rca-testbed-food
  labels:
    app: testbed-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-loadgen
  template:
    metadata:
      labels:
        app: testbed-loadgen
    spec:
      containers:
        - name: loadgen
          image: grafana/k6:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/entrypoint.sh"]
          env:
            - name: RESTAURANT_URL
              value: "http://testbed-restaurant:8081"
            - name: ORDER_URL
              value: "http://testbed-order:8080"
            - name: DISPATCH_URL
              value: "http://testbed-dispatch:8082"
            # RPS 진폭/시드는 env로 조정 가능(§8) — food-delivery 는 commerce 대비 저율
            # 기본값(peak 6 / trough 1).
            - name: PEAK_RPS
              value: "6"
            - name: TROUGH_RPS
              value: "1"
            - name: LOADGEN_SEED
              value: "42"
            - name: PRE_ALLOCATED_VUS
              value: "10"
            - name: MAX_VUS
              value: "30"
          volumeMounts:
            - name: loadgen-scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: loadgen-scripts
          configMap:
            name: loadgen-scripts
            defaultMode: 0755
