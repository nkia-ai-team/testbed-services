apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-restaurant
  namespace: rca-testbed-food
  labels:
    app: testbed-restaurant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-restaurant
  template:
    metadata:
      labels:
        app: testbed-restaurant
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: DirectoryOrCreate
        - name: wpm-agent
          hostPath:
            path: /opt/polestar10/wpm/restaurant
            type: DirectoryOrCreate
      containers:
        - name: restaurant-service
          image: food-delivery-restaurant:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true
            - name: wpm-agent
              mountPath: /opt/wpm
              readOnly: true
          envFrom:
            - configMapRef:
                name: service-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/wpm/wpmagent.jar -Dwpm.config=/opt/wpm/wpmagent.conf -javaagent:/opt/apm/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "${OTLP_ENDPOINT}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.organizationId=69d8a71a5fa0cb8784e5fb38,lucida.groupId=food-delivery"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
            - name: OTEL_SERVICE_NAME
              value: "food-delivery-restaurant"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-restaurant
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-restaurant
  ports:
    - port: 8081
      targetPort: 8081
