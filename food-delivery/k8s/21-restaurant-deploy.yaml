apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-restaurant
  namespace: rca-testbed-food
  labels:
    app: testbed-restaurant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-restaurant
  template:
    metadata:
      labels:
        app: testbed-restaurant
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: Directory
      containers:
        - name: restaurant-service
          image: food-delivery-restaurant:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: service-config
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/apm/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: "food-delivery-restaurant"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://192.168.230.119:14317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.groupId=food-delivery,lucida.target_id=18a0e363-d253-4712-be40-a9e9e117d1dc"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-restaurant
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-restaurant
  ports:
    - port: 8081
      targetPort: 8081
---
# tb-runner(클러스터 밖) loadgen용 외부 진입점 (20-order-deploy.yaml 주석 참조).
apiVersion: v1
kind: Service
metadata:
  name: testbed-restaurant-external
  namespace: rca-testbed-food
spec:
  type: NodePort
  selector:
    app: testbed-restaurant
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30181
