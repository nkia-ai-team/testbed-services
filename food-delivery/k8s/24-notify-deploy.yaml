apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-notify
  namespace: rca-testbed-food
  labels:
    app: testbed-notify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-notify
  template:
    metadata:
      labels:
        app: testbed-notify
    spec:
      containers:
        - name: notify-service
          image: food-delivery-notify:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: service-config
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-notify
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-notify
  ports:
    - port: 8084
      targetPort: 8084
