apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-notify
  namespace: rca-testbed-food
  labels:
    app: testbed-notify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-notify
  template:
    metadata:
      labels:
        app: testbed-notify
    spec:
      volumes:
        - name: apm-agent
          hostPath:
            path: /opt/polestar10/apm
            type: DirectoryOrCreate
        - name: wpm-agent
          hostPath:
            path: /opt/polestar10/wpm
            type: DirectoryOrCreate
      containers:
        - name: notify-service
          image: food-delivery-notify:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          volumeMounts:
            - name: apm-agent
              mountPath: /opt/apm
              readOnly: true
            - name: wpm-agent
              mountPath: /opt/wpm
              readOnly: true
          envFrom:
            - configMapRef:
                name: service-config
          env:
            # worker: DB 미사용 (Redis consumer 전용) → DB_* env 없음
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/wpm/template/wpmagent.jar -Dwpm.config=/opt/wpm/notify/wpmagent.conf -javaagent:/opt/apm/opentelemetry-javaagent.jar"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "${OTLP_ENDPOINT}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "lucida.organizationId=${POLESTAR_ORG_ID},lucida.groupId=food-delivery,lucida.target_id=${NOTIFY_TARGET_ID}"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
            - name: OTEL_SERVICE_NAME
              value: "food-delivery-notify"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-notify
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-notify
  ports:
    - port: 8084
      targetPort: 8084
