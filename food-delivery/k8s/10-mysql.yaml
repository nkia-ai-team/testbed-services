apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: testbed-mysql
  namespace: rca-testbed-food
  labels:
    app: testbed-mysql
spec:
  serviceName: testbed-mysql
  replicas: 1
  selector:
    matchLabels:
      app: testbed-mysql
  template:
    metadata:
      labels:
        app: testbed-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            # Polestar DPM 로그 수집용 — datadir(PVC)에 에러 로그를 고정 경로로 남겨
            # 호스트 SMS 로그 모니터(owner_kind=dpm)가 tail한다.
            - --log-error=/var/lib/mysql/error.log
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: mysqldata
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: init-scripts
          configMap:
            name: mysql-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: mysqldata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-mysql
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-mysql-external
  namespace: rca-testbed-food
spec:
  type: NodePort
  selector:
    app: testbed-mysql
  ports:
    - port: 3306
      targetPort: 3306
      # k3d serverlb 는 30200-30299 만 호스트로 포워딩. 이 범위를 벗어나면
      # 호스트/외부(DPM 관제 서버)에서 MySQL 에 닿지 못하므로 이 범위 안에서 지정한다.
      # 30232(구 postgres)와 충돌 없이, social-feed MySQL(30306)과도 겹치지 않는 값.
      nodePort: 30236
