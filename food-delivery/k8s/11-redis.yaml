# ============================================================
# Redis Deployment
# ============================================================
# 주문 이벤트 스트림(order-service → notify-service) 용도.
# 테스트베드라서 데이터 유실 무방 → StatefulSet 아닌 Deployment(PVC 없음).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-redis
  namespace: rca-testbed-food
  labels:
    app: testbed-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-redis
  template:
    metadata:
      labels:
        app: testbed-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
# Service (ClusterIP) — order/notify service 가 redis 접속 시 사용.
# ConfigMap 의 REDIS_HOST=testbed-redis 가 이 Service 를 가리킨다.
apiVersion: v1
kind: Service
metadata:
  name: testbed-redis
  namespace: rca-testbed-food
spec:
  selector:
    app: testbed-redis
  ports:
    - port: 6379
      targetPort: 6379
