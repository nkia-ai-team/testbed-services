server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fooddelivery}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:fooddelivery}
    password: ${DB_PASSWORD:fooddelivery1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

services:
  restaurant:
    url: ${SERVICES_RESTAURANT_URL:http://testbed-restaurant:8081}
    connect-timeout: 3s
    read-timeout: 5s
  dispatch:
    url: ${SERVICES_DISPATCH_URL:http://testbed-dispatch:8082}
    connect-timeout: 3s
    read-timeout: 5s
  payment:
    url: ${SERVICES_PAYMENT_URL:http://testbed-payment:8083}
    connect-timeout: 3s
    read-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
