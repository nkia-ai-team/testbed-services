server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:fooddelivery}
    username: ${POSTGRES_USER:fooddelivery}
    password: ${POSTGRES_PASSWORD:fooddelivery1234}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
    open-in-view: false

services:
  restaurant:
    url: ${SERVICES_RESTAURANT_URL:http://testbed-restaurant:8081}
    connect-timeout: 3s
    read-timeout: 5s
  dispatch:
    url: ${SERVICES_DISPATCH_URL:http://testbed-dispatch:8082}
    connect-timeout: 3s
    read-timeout: 5s
  payment:
    url: ${SERVICES_PAYMENT_URL:http://testbed-payment:8083}
    connect-timeout: 3s
    read-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
