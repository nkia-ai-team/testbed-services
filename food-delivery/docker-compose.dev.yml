# Local dev compose — runs the full stack on localhost for engineer iteration.
# Production deployment uses k8s/ manifests instead.

services:
  mysql:
    image: mysql:8.0
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_DATABASE: fooddelivery
      MYSQL_USER: fooddelivery
      MYSQL_PASSWORD: fooddelivery1234
      MYSQL_ROOT_PASSWORD: rootpassword1234
    ports:
      - "13306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mysqldata:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  external-pg-mock:
    image: mockserver/mockserver:latest
    environment:
      MOCKSERVER_LIVENESS_HTTP_GET_PATH: /liveness/probe
    ports:
      - "9090:1080"

  order:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: food-delivery-order:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  restaurant:
    build:
      context: .
      dockerfile: restaurant-service/Dockerfile
    image: food-delivery-restaurant:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  dispatch:
    build:
      context: .
      dockerfile: dispatch-service/Dockerfile
    image: food-delivery-dispatch:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
      ORDER_SERVICE_URL: http://order:8080
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - order

  payment:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: food-delivery-payment:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
      ORDER_SERVICE_URL: http://order:8080
      PG_API_URL: http://external-pg-mock:1080
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - order
      - external-pg-mock

  notify:
    build:
      context: .
      dockerfile: notify-service/Dockerfile
    image: food-delivery-notify:latest
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8084:8084"
    depends_on:
      - redis

volumes:
  mysqldata:
