# Local dev compose — runs the full stack on localhost for engineer iteration.
# Production deployment uses k8s/ manifests instead.

services:
  mysql:
    image: mysql:8.0
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_DATABASE: fooddelivery
      MYSQL_USER: fooddelivery
      MYSQL_PASSWORD: fooddelivery1234
      MYSQL_ROOT_PASSWORD: rootpassword1234
    ports:
      - "13306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mysqldata:/var/lib/mysql

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "19093:19093"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:19093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: rca-testbed-food-kafka-1

  external-pg-mock:
    image: mockserver/mockserver:latest
    environment:
      MOCKSERVER_LIVENESS_HTTP_GET_PATH: /liveness/probe
    ports:
      - "9090:1080"

  order:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: food-delivery-order:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - kafka

  restaurant:
    build:
      context: .
      dockerfile: restaurant-service/Dockerfile
    image: food-delivery-restaurant:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  dispatch:
    build:
      context: .
      dockerfile: dispatch-service/Dockerfile
    image: food-delivery-dispatch:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
      ORDER_SERVICE_URL: http://order:8080
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - order

  payment:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: food-delivery-payment:latest
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fooddelivery
      DB_USER: fooddelivery
      DB_PASSWORD: fooddelivery1234
      ORDER_SERVICE_URL: http://order:8080
      PG_API_URL: http://external-pg-mock:1080
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - order
      - external-pg-mock

  notify:
    build:
      context: .
      dockerfile: notify-service/Dockerfile
    image: food-delivery-notify:latest
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"
    depends_on:
      - kafka

volumes:
  mysqldata:
